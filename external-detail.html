<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>외부구매 후기 — 술향기마을</title>
<style>
  :root{--green-50:#EEFAF2;--green-100:#B8EAC8;--green-200:#44CC66;--green-400:#22AA44;--green-600:#118833;--bg:#EEF8F2;--bg-card:#fff;--text-primary:#041810;--text-secondary:#2a5a38;--text-muted:#68987a;--border:rgba(0,0,0,0.07);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;}
  nav{background:var(--bg-card);border-bottom:0.5px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .nav-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);cursor:pointer;}.nav-back:hover{color:var(--green-400);}.nav-back svg{width:16px;height:16px;}
  .nav-logo{font-size:15px;font-weight:600;display:flex;align-items:center;gap:7px;}
  .nav-logo-dot{width:8px;height:8px;border-radius:50%;background:var(--green-200);}
  .nav-spacer{width:80px;}
  .content{max-width:640px;margin:0 auto;padding:20px 24px 40px;}
  .ext-preview{background:var(--bg-card);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;cursor:pointer;transition:box-shadow 0.15s;}
  .ext-preview:hover{box-shadow:0 4px 16px rgba(34,170,68,0.12);}
  .ext-img{height:180px;background:var(--green-50);display:flex;align-items:center;justify-content:center;font-size:48px;background-size:cover;background-position:center;}
  .ext-body{padding:16px 18px;}
  .ext-retailer{display:inline-block;font-size:11px;background:var(--green-50);color:var(--green-600);padding:3px 10px;border-radius:99px;font-weight:600;margin-bottom:8px;}
  .ext-title{font-size:17px;font-weight:700;margin-bottom:6px;}
  .ext-link-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);}
  .ext-link-row svg{width:13px;height:13px;}
  .section{margin-bottom:16px;background:var(--bg-card);border:0.5px solid var(--border);border-radius:12px;padding:16px 18px;}
  .rating-row{font-size:15px;color:var(--green-600);margin-bottom:8px;}
  .body-text{font-size:14px;color:var(--text-secondary);line-height:1.9;white-space:pre-wrap;}
  .meta-row{font-size:12px;color:var(--text-muted);margin-top:8px;}
  .actions{display:flex;gap:8px;margin-top:14px;}
  .like-btn{display:flex;align-items:center;gap:5px;font-size:13px;background:var(--bg-card);border:0.5px solid var(--border);border-radius:99px;padding:7px 16px;cursor:pointer;font-family:inherit;transition:all 0.15s;}
  .like-btn:hover{border-color:var(--green-200);}
  .like-btn.liked{background:var(--green-50);border-color:var(--green-200);color:var(--green-600);}
  .comment-title{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:12px;}
  .comment-item{padding:10px 0;border-bottom:0.5px solid var(--border);}
  .comment-item:last-child{border-bottom:none;}
  .comment-head{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:12px;color:var(--text-secondary);}
  .comment-body{font-size:13px;color:var(--text-secondary);line-height:1.6;}
  .comment-form{margin-top:12px;display:flex;flex-direction:column;gap:8px;}
  .comment-input{width:100%;background:var(--bg);border:0.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text-primary);font-family:inherit;resize:none;height:64px;outline:none;}
  .comment-input:focus{border-color:var(--green-200);}
  .comment-submit{align-self:flex-end;background:var(--green-200);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
  .empty{text-align:center;padding:20px;color:var(--text-muted);font-size:13px;}
  #page-loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;}
  #page-loading.hide{display:none;}
  @media(max-width:480px){nav{padding:12px 16px;}.content{padding:16px 16px 32px;}}
</style>
</head>
<body>

<div id="page-loading"><div style="font-size:13px;color:var(--text-muted);">불러오는 중...</div></div>

<nav>
  <a class="nav-back" onclick="goBack()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
    뒤로가기
  </a>
  <div class="nav-logo"><div class="nav-logo-dot"></div>술향기마을</div>
  <div class="nav-spacer"></div>
</nav>

<div class="content">
  <div class="ext-preview" id="ext-preview-card">
    <div class="ext-img" id="p-img">🔗</div>
    <div class="ext-body">
      <span class="ext-retailer" id="p-retailer">—</span>
      <div class="ext-title" id="p-title">—</div>
      <div class="ext-link-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/></svg>
        <span id="p-url">클릭해서 구매 페이지로 이동</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="rating-row" id="p-rating" style="display:none;"></div>
    <div class="body-text" id="p-body"></div>
    <div class="meta-row" id="p-meta"></div>
    <div class="actions">
      <button class="like-btn" id="like-btn" onclick="toggleLike()">👍 <span id="like-count">0</span></button>
    </div>
  </div>

  <div class="section">
    <div class="comment-title">댓글 <span id="comment-count"></span></div>
    <div id="comments-list"><div class="empty">불러오는 중...</div></div>
    <div id="comment-form-wrap">
      <div class="comment-form">
        <textarea class="comment-input" id="comment-input" placeholder="댓글을 작성해주세요..."></textarea>
        <button class="comment-submit" onclick="submitComment()">댓글 등록</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/core/supabase.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const postId = params.get('id');
  let currentUser = null;
  let postData = null;
  let isLiked = false;
  let isTogglingLike = false;
  let isSubmittingComment = false;

  function esc(str) { const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }

  function goBack() {
    const from = params.get('from');
    location.href = from === 'shop.html' ? from : 'shop.html';
  }

  function isSafeUrl(value) {
    if (!value) return false;
    try {
      const u = new URL(value);
      return ['http:', 'https:'].includes(u.protocol);
    } catch { return false; }
  }

  function timeAgo(dateStr) {
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
    if (diff < 60) return '방금 전';
    if (diff < 3600) return Math.floor(diff/60) + '분 전';
    if (diff < 86400) return Math.floor(diff/3600) + '시간 전';
    return Math.floor(diff/86400) + '일 전';
  }

  function goToExternal() {
    if (postData?.external_url && isSafeUrl(postData.external_url)) window.open(postData.external_url, '_blank', 'noopener');
  }

  async function init() {
    if (!postId) { location.href = 'shop.html'; return; }
    try {
      const { data: { session } } = await soolClient.auth.getSession();
      if (session) {
        const { data: user } = await soolClient.from('users').select('id, nickname').eq('id', session.user.id).single();
        currentUser = user;
      } else {
        document.getElementById('comment-form-wrap').innerHTML = `<div class="empty"><a href="auth.html" style="color:var(--green-400);text-decoration:none;">로그인</a> 후 댓글을 작성할 수 있어요</div>`;
      }
      await loadPost();
    } catch (error) {
      console.error('초기화 실패:', error);
    } finally {
      document.getElementById('page-loading').classList.add('hide');
    }
  }

  async function loadPost() {
    const { data, error } = await soolClient.from('external_purchase_posts').select('*, users(nickname)').eq('id', postId).single();
    if (error || !data) { location.href = 'shop.html'; return; }
    postData = data;

    document.title = data.title + ' — 술향기마을';
    document.getElementById('ext-preview-card').onclick = goToExternal;
    document.getElementById('p-retailer').textContent = data.retailer;
    document.getElementById('p-title').textContent = data.title;
    document.getElementById('p-url').textContent = isSafeUrl(data.external_url) ? `${data.retailer}에서 구매하러 가기 →` : '링크를 열 수 없어요';
    if (data.image_url && isSafeUrl(data.image_url)) {
      document.getElementById('p-img').style.backgroundImage = `url("${data.image_url}")`;
      document.getElementById('p-img').textContent = '';
    }
    document.getElementById('p-body').textContent = data.description || '';
    document.getElementById('p-meta').textContent = `@${data.users?.nickname || '익명'} · ${timeAgo(data.created_at)}`;
    document.getElementById('like-count').textContent = data.like_count || 0;

    const rating = Math.min(5, Math.max(0, Number(data.rating) || 0));
    if (rating > 0) {
      const ratingEl = document.getElementById('p-rating');
      ratingEl.style.display = 'block';
      ratingEl.textContent = '★'.repeat(rating) + '☆'.repeat(5 - rating);
    }

    if (currentUser) {
      const { data: liked, error: likeErr } = await soolClient.from('external_purchase_likes').select('id').eq('post_id', postId).eq('user_id', currentUser.id).maybeSingle();
      if (likeErr) console.error('좋아요 상태 확인 실패:', likeErr);
      if (liked) { isLiked = true; document.getElementById('like-btn').classList.add('liked'); }
    }

    await loadComments();
  }

  async function toggleLike() {
    if (!currentUser) { alert('로그인 후 좋아요를 누를 수 있어요'); location.href = 'auth.html'; return; }
    if (isTogglingLike) return;
    isTogglingLike = true;
    const btn = document.getElementById('like-btn');
    btn.disabled = true;
    const countEl = document.getElementById('like-count');
    const count = parseInt(countEl.textContent) || 0;

    try {
      if (isLiked) {
        const { error } = await soolClient.from('external_purchase_likes').delete().eq('post_id', postId).eq('user_id', currentUser.id);
        if (error) throw error;
        // like_count는 DB 트리거가 자동 갱신
        countEl.textContent = Math.max(0, count - 1);
        btn.classList.remove('liked');
        isLiked = false;
      } else {
        const { error } = await soolClient.from('external_purchase_likes').insert({ post_id: postId, user_id: currentUser.id });
        if (error) throw error;
        countEl.textContent = count + 1;
        btn.classList.add('liked');
        isLiked = true;
      }
    } catch (error) {
      console.error('좋아요 처리 실패:', error);
    } finally {
      isTogglingLike = false;
      btn.disabled = false;
    }
  }

  async function loadComments() {
    const { data, error } = await soolClient.from('external_purchase_comments').select('*, users(nickname)').eq('post_id', postId).order('created_at', { ascending: true }).limit(100);
    const list = document.getElementById('comments-list');
    if (error) { console.error('댓글 로드 실패:', error); list.innerHTML = '<div class="empty">댓글을 불러오지 못했어요.</div>'; return; }
    document.getElementById('comment-count').textContent = (data?.length || 0) + '개';
    if (!data || data.length === 0) { list.innerHTML = '<div class="empty">아직 댓글이 없어요. 첫 댓글을 남겨보세요!</div>'; return; }
    list.innerHTML = data.map(c => `
      <div class="comment-item">
        <div class="comment-head"><span>@${esc(c.users?.nickname || '익명')}</span><span>${timeAgo(c.created_at)}</span></div>
        <div class="comment-body">${esc(c.content)}</div>
      </div>
    `).join('');
  }

  async function submitComment() {
    if (!currentUser || isSubmittingComment) return;
    const content = document.getElementById('comment-input').value.trim();
    if (!content) return;

    isSubmittingComment = true;
    const btn = document.querySelector('.comment-submit');
    if (btn) btn.disabled = true;
    try {
      const { error } = await soolClient.from('external_purchase_comments').insert({ post_id: postId, user_id: currentUser.id, content });
      if (error) { console.error('댓글 등록 실패:', error); return; }
      // comment_count는 DB 트리거가 자동 갱신
      document.getElementById('comment-input').value = '';
      await loadComments();
    } finally {
      isSubmittingComment = false;
      if (btn) btn.disabled = false;
    }
  }

  init();
</script>
</body>
</html>
