<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 공간 — 술향기마을</title>
<style>
  :root {
    --gold-50:  #FDF8EE;
    --gold-100: #F5E6B0;
    --gold-200: #E8C840;
    --gold-400: #C4A020;
    --gold-600: #8A6E10;
    --gold-900: #3A2C04;
    --bg: #F8F4EC;
    --bg-card: #ffffff;
    --text-primary: #1a1408;
    --text-secondary: #6b5c3e;
    --text-muted: #a09070;
    --border: rgba(0,0,0,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; }
  nav { background: var(--bg-card); border-bottom: 0.5px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .nav-back { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); text-decoration: none; cursor: pointer; }
  .nav-back:hover { color: var(--gold-400); }
  .nav-back svg { width: 16px; height: 16px; }
  .nav-logo { font-size: 15px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 7px; }
  .nav-logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold-200); }
  .nav-spacer { width: 80px; }
  .hero { background: linear-gradient(135deg, #FDF8EE 0%, #F5E6B0 100%); border-bottom: 0.5px solid var(--border); padding: 28px 24px 24px; }
  .hero-inner { max-width: 640px; margin: 0 auto; display: flex; gap: 20px; align-items: flex-start; }
  .house-avatar { width: 72px; height: 72px; border-radius: 14px; background: var(--gold-200); border: 2px solid var(--gold-400); display: flex; align-items: center; justify-content: center; font-size: 32px; flex-shrink: 0; }
  .hero-tag { display: inline-block; font-size: 11px; font-weight: 600; color: var(--gold-600); background: var(--gold-100); padding: 3px 10px; border-radius: 99px; margin-bottom: 8px; }
  .hero-title { font-size: 20px; font-weight: 700; color: var(--gold-900); margin-bottom: 4px; }
  .hero-sub { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 4px; }
  .hero-note { font-size: 11px; color: var(--text-muted); }
  .tabs { background: var(--bg-card); border-bottom: 0.5px solid var(--border); display: flex; overflow-x: auto; max-width: 100%; justify-content:center; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 12px 18px; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .tab.active { color: var(--gold-600); border-bottom-color: var(--gold-400); }
  .tab:hover { color: var(--text-secondary); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .section { padding: 20px 24px; max-width: 640px; margin: 0 auto; }
  .section-title { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 14px; display:flex; justify-content:space-between; align-items:center; }
  .add-btn { font-size: 12px; font-weight: 600; color: var(--gold-600); cursor: pointer; background: none; border: none; font-family: inherit; text-transform: none; letter-spacing: 0; }
  .review-list { display: flex; flex-direction: column; gap: 10px; }
  .review-card { background: var(--bg-card); border: 0.5px solid var(--border); border-radius: 12px; padding: 14px 16px; cursor: pointer; transition: border-color 0.15s; }
  .review-card:hover { border-color: var(--gold-400); }
  .review-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .review-emoji { font-size: 22px; }
  .review-name { font-size: 14px; font-weight: 600; color: var(--text-primary); flex: 1; }
  .review-rating { color: var(--gold-400); font-size: 13px; }
  .review-body { font-size: 13px; color: var(--text-secondary); line-height: 1.55; margin-bottom: 8px; }
  .review-meta { display: flex; align-items: center; gap: 10px; }
  .review-tag { font-size: 11px; color: var(--text-muted); background: var(--bg); border: 0.5px solid var(--border); padding: 2px 8px; border-radius: 99px; }
  .review-date { font-size: 11px; color: var(--text-muted); margin-left: auto; }
  .bookmark-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; }
  .bookmark-card { background: var(--bg-card); border: 0.5px solid var(--border); border-radius: 10px; padding: 12px; cursor: pointer; transition: border-color 0.15s; position:relative; }
  .bookmark-card:hover { border-color: var(--gold-400); }
  .bookmark-icon { font-size: 20px; margin-bottom: 6px; }
  .bookmark-title { font-size: 13px; font-weight: 500; color: var(--text-primary); margin-bottom: 2px; }
  .bookmark-sub { font-size: 11px; color: var(--text-muted); }
  .bookmark-type { display: inline-block; font-size: 10px; margin-top: 6px; color: var(--text-muted); background: var(--bg); border: 0.5px solid var(--border); padding: 1px 7px; border-radius: 99px; }
  .bookmark-remove { position:absolute; top:8px; right:8px; font-size:14px; color:var(--text-muted); cursor:pointer; }
  .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }
  .empty-text { font-size: 14px; }
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;align-items:flex-end;justify-content:center;z-index:50;}
  .modal-overlay.show{display:flex;}
  .modal{background:#fff;border-radius:16px 16px 0 0;padding:20px 20px 24px;width:100%;max-width:640px;max-height:85vh;overflow-y:auto;}
  .modal-title{font-size:16px;font-weight:700;margin-bottom:16px;}
  .form-row{margin-bottom:12px;}
  .form-label{font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px;display:block;}
  .form-select,.form-input{width:100%;border:0.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;font-family:inherit;color:var(--text-primary);outline:none;}
  .form-select:focus,.form-input:focus{border-color:var(--gold-400);}
  .modal-actions{display:flex;gap:8px;margin-top:16px;}
  .btn-cancel{flex:1;padding:12px;border-radius:8px;border:0.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text-secondary);}
  .btn-submit{flex:2;padding:12px;border-radius:8px;border:none;background:var(--gold-200);color:var(--gold-900);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
  .modal-msg{font-size:12px;color:var(--gold-600);margin-bottom:8px;min-height:16px;}
  @media (max-width: 480px) { nav { padding: 12px 16px; } .hero { padding: 20px 16px 20px; } .hero-inner { flex-direction: column; gap: 12px; } .section { padding: 16px 16px; } .bookmark-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<nav>
  <a class="nav-back" onclick="goBack()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
    마을로 돌아가기
  </a>
  <div class="nav-logo"><div class="nav-logo-dot"></div>술향기마을</div>
  <div class="nav-spacer"></div>
</nav>

<div class="hero">
  <div class="hero-inner">
    <div class="house-avatar">🏠</div>
    <div style="flex:1;">
      <div class="hero-tag">내 공간 · 마이하우스</div>
      <h1 class="hero-title" id="user-title">술향기마을 주민</h1>
      <p class="hero-sub" id="user-stats">불러오는 중...</p>
      <p class="hero-note">레벨·성장 시스템은 준비 중이에요 🌱</p>
    </div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('reviews', this)">내 리뷰</div>
  <div class="tab" onclick="switchTab('notifs', this)">알림</div>
  <div class="tab" onclick="switchTab('bookmarks', this)">즐겨찾기</div>
  <div class="tab" onclick="switchTab('feed', this)">친구 피드</div>
  <div class="tab" onclick="switchTab('orders', this)">쇼핑</div>
</div>

<!-- ── 내 리뷰 ── -->
<div id="tab-reviews" class="tab-content active">
  <div class="section">
    <p class="section-title">내가 작성한 리뷰</p>
    <div class="review-list" id="reviews-list"><div class="empty"><div class="empty-icon">⏳</div><div class="empty-text">불러오는 중...</div></div></div>
  </div>
</div>

<!-- ── 알림 (준비 중) ── -->
<div id="tab-notifs" class="tab-content">
  <div class="section">
    <div class="empty"><div class="empty-icon">🔔</div><div class="empty-text">알림 기능은 준비 중이에요</div></div>
  </div>
</div>

<!-- ── 즐겨찾기 ── -->
<div id="tab-bookmarks" class="tab-content">
  <div class="section">
    <p class="section-title">저장한 리뷰 & 게시글 & 위시리스트 <button class="add-btn" onclick="openBookmarkModal()">+ 추가</button></p>
    <div class="bookmark-grid" id="bookmarks-list"><div class="empty"><div class="empty-icon">⏳</div><div class="empty-text">불러오는 중...</div></div></div>
  </div>
</div>

<!-- ── 친구 피드 (준비 중) ── -->
<div id="tab-feed" class="tab-content">
  <div class="section">
    <div class="empty"><div class="empty-icon">👥</div><div class="empty-text">팔로우 기능이 만들어지면 친구들의 활동을 볼 수 있어요</div></div>
  </div>
</div>

<!-- ── 쇼핑 (준비 중) ── -->
<div id="tab-orders" class="tab-content">
  <div class="section">
    <div class="empty"><div class="empty-icon">🛒</div><div class="empty-text">주류 상점이 완성되면 장바구니·주문 내역을 볼 수 있어요</div></div>
  </div>
</div>

<!-- 즐겨찾기 추가 모달 -->
<div class="modal-overlay" id="bookmark-modal">
  <div class="modal">
    <div class="modal-title">즐겨찾기 추가</div>
    <div class="modal-msg" id="bookmark-msg"></div>
    <div class="form-row">
      <label class="form-label">구분</label>
      <select class="form-select" id="bookmark-type">
        <option value="리뷰">리뷰</option>
        <option value="게시글">게시글</option>
        <option value="위시리스트">위시리스트</option>
      </select>
    </div>
    <div class="form-row">
      <label class="form-label">이모지 (선택)</label>
      <input class="form-input" id="bookmark-emoji" placeholder="🥃" maxlength="4">
    </div>
    <div class="form-row">
      <label class="form-label">제목</label>
      <input class="form-input" id="bookmark-title" placeholder="예: 글렌피딕 18년 완벽 가이드">
    </div>
    <div class="form-row">
      <label class="form-label">부제 (작성자 또는 가격 등)</label>
      <input class="form-input" id="bookmark-subtitle" placeholder="예: 위스키덕후 작성 / ₩89,000">
    </div>
    <div class="form-row">
      <label class="form-label">링크 (해당 페이지 경로)</label>
      <input class="form-input" id="bookmark-link" placeholder="예: drink-detail.html?id=...">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeBookmarkModal()">취소</button>
      <button class="btn-submit" onclick="submitBookmark()">저장하기</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/core/supabase.js"></script>
<script>
  let currentUser = null;

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }
  function goBack() { location.href = 'index.html'; }

  function switchTab(name, el) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    el.classList.add('active');
    sessionStorage.setItem('myspace_tab', name);
  }

  function timeAgo(dateStr) {
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
    if (diff < 60) return '방금 전';
    if (diff < 3600) return Math.floor(diff/60) + '분 전';
    if (diff < 86400) return Math.floor(diff/3600) + '시간 전';
    if (diff < 604800) return Math.floor(diff/86400) + '일 전';
    return Math.floor(diff/604800) + '주 전';
  }

  async function init() {
    const { data: { session } } = await soolClient.auth.getSession();
    if (!session) {
      document.getElementById('user-title').textContent = '로그인이 필요해요';
      document.getElementById('user-stats').innerHTML = `<a href="auth.html" style="color:var(--gold-600);">로그인하러 가기</a>`;
      return;
    }
    const { data: user } = await soolClient.from('users').select('id, nickname').eq('id', session.user.id).single();
    currentUser = user;
    document.getElementById('user-title').textContent = `술향기마을 주민 ${user?.nickname || ''}`;

    await loadReviews();
    await loadBookmarks();

    const savedTab = sessionStorage.getItem('myspace_tab');
    if (savedTab && savedTab !== 'reviews') {
      const tabMap = { reviews: 1, notifs: 2, bookmarks: 3, feed: 4, orders: 5 };
      const tabEl = document.querySelector(`.tab:nth-child(${tabMap[savedTab]})`);
      if (tabEl) switchTab(savedTab, tabEl);
    }
  }

  // ── 내 리뷰 (술바 + 소버카페 리뷰 통합) ──────────────────
  async function loadReviews() {
    const list = document.getElementById('reviews-list');

    const [{ data: barReviews }, { data: cafeReviews }] = await Promise.all([
      soolClient.from('reviews').select('*, drinks(name, category)').eq('user_id', currentUser.id).order('created_at', { ascending: false }),
      soolClient.from('cafe_nolo_reviews').select('*, cafe_nolo_drinks(name, category)').eq('user_id', currentUser.id).order('created_at', { ascending: false }),
    ]);

    const merged = [
      ...(barReviews || []).map(r => ({
        emoji: '🥃', name: r.drinks?.name || '삭제된 술', rating: r.rating, content: r.content,
        tag: r.drinks?.category, created_at: r.created_at, link: r.drink_id ? `drink-detail.html?id=${r.drink_id}` : null,
      })),
      ...(cafeReviews || []).map(r => ({
        emoji: r.cafe_nolo_drinks?.category === '저알코올' ? '🍵' : '🫧', name: r.cafe_nolo_drinks?.name || '삭제된 음료', rating: r.rating, content: r.content,
        tag: r.cafe_nolo_drinks?.category, created_at: r.created_at, link: r.nolo_drink_id ? `cafe-detail.html?type=nolo&id=${r.nolo_drink_id}` : null,
      })),
    ].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

    document.getElementById('user-stats').textContent = `리뷰 ${merged.length}개`;

    if (merged.length === 0) {
      list.innerHTML = '<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">아직 작성한 리뷰가 없어요</div></div>';
      return;
    }

    list.innerHTML = merged.map(r => `
      <div class="review-card" ${r.link ? `onclick="location.href='${r.link}'"` : ''}>
        <div class="review-header">
          <div class="review-emoji">${r.emoji}</div>
          <div class="review-name">${esc(r.name)}</div>
          <div class="review-rating">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>
        </div>
        ${r.content ? `<div class="review-body">${esc(r.content)}</div>` : ''}
        <div class="review-meta">
          ${r.tag ? `<span class="review-tag">${esc(r.tag)}</span>` : ''}
          <span class="review-date">${timeAgo(r.created_at)}</span>
        </div>
      </div>
    `).join('');
  }

  // ── 즐겨찾기 ──────────────────────
  async function loadBookmarks() {
    const { data, error } = await soolClient.from('bookmarks').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
    const wrap = document.getElementById('bookmarks-list');
    if (error) { wrap.innerHTML = '<div class="empty"><div class="empty-text">불러오지 못했어요</div></div>'; return; }
    if (!data || data.length === 0) {
      wrap.innerHTML = '<div class="empty" style="grid-column:1/-1;"><div class="empty-icon">⭐</div><div class="empty-text">저장한 항목이 없어요</div></div>';
      return;
    }
    wrap.innerHTML = data.map(b => `
      <div class="bookmark-card" onclick="location.href='${esc(b.link_url)}'">
        <span class="bookmark-remove" onclick="event.stopPropagation();removeBookmark('${b.id}')">✕</span>
        <div class="bookmark-icon">${esc(b.emoji || '⭐')}</div>
        <div class="bookmark-title">${esc(b.title)}</div>
        <div class="bookmark-sub">${esc(b.subtitle || '')}</div>
        <div class="bookmark-type">${esc(b.item_type)}</div>
      </div>
    `).join('');
  }

  function openBookmarkModal() {
    document.getElementById('bookmark-msg').textContent = '';
    document.getElementById('bookmark-emoji').value = '';
    document.getElementById('bookmark-title').value = '';
    document.getElementById('bookmark-subtitle').value = '';
    document.getElementById('bookmark-link').value = '';
    document.getElementById('bookmark-modal').classList.add('show');
  }
  function closeBookmarkModal() { document.getElementById('bookmark-modal').classList.remove('show'); }

  async function submitBookmark() {
    const item_type = document.getElementById('bookmark-type').value;
    const emoji = document.getElementById('bookmark-emoji').value.trim() || '⭐';
    const title = document.getElementById('bookmark-title').value.trim();
    const subtitle = document.getElementById('bookmark-subtitle').value.trim();
    const link_url = document.getElementById('bookmark-link').value.trim();
    const msg = document.getElementById('bookmark-msg');
    if (!title || !link_url) { msg.textContent = '제목과 링크는 필수예요'; return; }

    const { error } = await soolClient.from('bookmarks').insert({ user_id: currentUser.id, item_type, emoji, title, subtitle, link_url });
    if (error) { console.error('저장 실패:', error); msg.textContent = '저장에 실패했어요'; return; }
    closeBookmarkModal();
    await loadBookmarks();
  }

  async function removeBookmark(id) {
    await soolClient.from('bookmarks').delete().eq('id', id);
    await loadBookmarks();
  }

  init();
</script>

<script src="js/ui/chat.js"></script>
<script>initSoolChat({ channelKey: 'building:myspace', label: '내공간 채팅', accentColor: '#C4A020' });</script>
</body>
</html>
