<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>커뮤니티 센터 — 술향기마을</title>
<style>
  :root{--purple-50:#F3EEFF;--purple-100:#D4B8FF;--purple-200:#9966FF;--purple-400:#7744DD;--purple-600:#5522AA;--purple-900:#1E0A44;--bg:#F2EEFB;--bg-card:#fff;--text-primary:#100820;--text-secondary:#4a3868;--text-muted:#8878aa;--border:rgba(0,0,0,0.07);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;}
  nav{background:var(--bg-card);border-bottom:0.5px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .nav-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);text-decoration:none;cursor:pointer;}.nav-back:hover{color:var(--purple-400);}.nav-back svg{width:16px;height:16px;}
  .nav-logo{font-size:15px;font-weight:600;display:flex;align-items:center;gap:7px;}
  .nav-logo-dot{width:8px;height:8px;border-radius:50%;background:var(--purple-200);}
  .nav-spacer{width:80px;}
  .hero{background:linear-gradient(135deg,#1E0A44 0%,#4A2A88 100%);padding:32px 24px 28px;}
  .hero-inner{max-width:640px;margin:0 auto;}
  .hero-tag{display:inline-block;font-size:11px;font-weight:600;color:#D4B8FF;background:rgba(255,255,255,0.1);padding:3px 10px;border-radius:99px;margin-bottom:10px;}
  .hero-title{font-size:24px;font-weight:700;color:#fff;margin-bottom:6px;}
  .hero-sub{font-size:14px;color:rgba(255,255,255,0.7);line-height:1.65;}
  .section{padding:20px 24px;max-width:640px;margin:0 auto;}
  .section-title{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:14px;}
  .tabs{background:var(--bg-card);border-bottom:0.5px solid var(--border);display:flex;overflow-x:auto;justify-content:center;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{padding:12px 18px;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all 0.15s;}.tab.active{color:var(--purple-400);border-bottom-color:var(--purple-200);}
  .tab-content{display:none;}.tab-content.active{display:block;}
  .community-card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color 0.15s;display:flex;align-items:center;gap:12px;}.community-card:hover{border-color:var(--purple-200);}
  .community-icon{font-size:28px;width:44px;height:44px;border-radius:10px;background:var(--purple-50);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .community-name{font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:3px;}
  .community-desc{font-size:12px;color:var(--text-secondary);}
  .community-members{font-size:11px;color:var(--text-muted);margin-top:4px;}
  .post-card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
  .post-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .post-avatar{width:28px;height:28px;border-radius:50%;background:var(--purple-50);display:flex;align-items:center;justify-content:center;font-size:14px;}
  .post-author{font-size:12px;font-weight:500;color:var(--text-secondary);}
  .post-time{font-size:11px;color:var(--text-muted);margin-left:auto;}
  .post-title{font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:4px;}
  .post-body{font-size:13px;color:var(--text-secondary);line-height:1.5;}
  .post-footer{display:flex;gap:12px;margin-top:10px;}
  .post-stat{font-size:12px;color:var(--text-muted);}
  .write-btn{width:100%;background:var(--purple-200);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;transition:background 0.15s;}.write-btn:hover{background:var(--purple-400);}
  .post-card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color 0.15s;}.post-card:hover{border-color:var(--purple-200);}
  .post-cat{font-size:10px;background:var(--purple-50);color:var(--purple-600);padding:2px 7px;border-radius:99px;font-weight:500;}
  .write-form{display:flex;flex-direction:column;gap:12px;}
  .write-label{font-size:11px;color:var(--text-muted);letter-spacing:0.06em;margin-bottom:4px;}
  .write-select,.write-input,.write-textarea{width:100%;background:var(--bg);border:0.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text-primary);font-family:inherit;outline:none;transition:border-color 0.15s;}
  .write-select:focus,.write-input:focus,.write-textarea:focus{border-color:var(--purple-200);}
  .write-textarea{resize:none;height:120px;}
  .write-select option{background:#fff;}
  .form-msg{font-size:12px;text-align:center;padding:6px;border-radius:8px;display:none;}
  .form-msg.success{display:block;background:rgba(74,222,128,0.1);color:#16a34a;}
  .form-msg.error{display:block;background:rgba(239,68,68,0.1);color:#dc2626;}
  .empty{text-align:center;padding:32px;color:var(--text-muted);font-size:13px;}
  @media(max-width:480px){nav{padding:12px 16px;}.hero{padding:20px 16px 20px;}.section{padding:16px;}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/core/supabase.js"></script>
</head>
<body>
<nav>
  <a class="nav-back" onclick="goBack()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>마을로 돌아가기</a>
  <div class="nav-logo"><div class="nav-logo-dot"></div>술향기마을</div>
  <div class="nav-spacer"></div>
</nav>
<div class="hero">
  <div class="hero-inner">
    <div class="hero-tag">커뮤니티 센터 · 소셜 & 모임</div>
    <h1 class="hero-title">🏛️ 커뮤니티 센터</h1>
    <p class="hero-sub">취향 기반 소규모 커뮤니티.<br>나와 같은 취향의 사람들을 만나보세요.</p>
  </div>
</div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('communities',this)">커뮤니티</div>
  <div class="tab" onclick="switchTab('posts',this)">자유게시판</div>
  <div class="tab" onclick="switchTab('write',this)">글쓰기</div>
</div>
<div id="tab-communities" class="tab-content active">
  <div class="section">
    <p class="section-title">커뮤니티</p>
    <div id="communities-list"><div class="empty">불러오는 중...</div></div>
  </div>
</div>
<div id="tab-posts" class="tab-content">
  <div class="section">
    <p class="section-title">최신 게시글</p>
    <div id="posts-list"><div class="empty">불러오는 중...</div></div>
  </div>
</div>
<div id="tab-write" class="tab-content">
  <div class="section">
    <p class="section-title">게시글 작성</p>
    <div id="write-wrap">
      <div class="write-form">
        <div>
          <div class="write-label">커뮤니티 *</div>
          <select class="write-select" id="post-community">
            <option value="">선택하세요</option>
          </select>
        </div>
        <div>
          <div class="write-label">제목 *</div>
          <input class="write-input" id="post-title" placeholder="게시글 제목을 입력하세요" maxlength="100" />
        </div>
        <div>
          <div class="write-label">내용 *</div>
          <textarea class="write-textarea" id="post-content" placeholder="내용을 입력하세요..."></textarea>
        </div>
        <div>
          <div class="write-label">이미지 URL (선택)</div>
          <input class="write-input" id="post-image" placeholder="https://... 이미지 주소를 입력하세요" />
        </div>
        <div>
          <div class="write-label">유튜브 / 외부 링크 (선택)</div>
          <input class="write-input" id="post-embed" placeholder="https://youtube.com/... 링크를 입력하세요" />
        </div>
        <div class="form-msg" id="write-msg"></div>
        <button class="write-btn" onclick="submitPost()">게시글 등록 +30 XP</button>
      </div>
    </div>
  </div>
</div>
<script>
  function switchTab(name, el) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    el.classList.add('active');
    sessionStorage.setItem('community_tab', name);
  }
  function goBack() { location.href = 'index.html'; }
  // 복귀 시 탭 복원
  document.addEventListener('DOMContentLoaded', () => {
    const savedTab = sessionStorage.getItem('community_tab');
    if (savedTab && savedTab !== 'communities') {
      const tabMap = {"communities": 1, "posts": 2, "write": 3};
      const tabEl = document.querySelector(`.tab:nth-child(${tabMap[savedTab]})`);
      if (tabEl) switchTab(savedTab, tabEl);
    }
  });

  let communitiesData = [];

  function timeAgo(dateStr) {
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
    if (diff < 60) return '방금 전';
    if (diff < 3600) return Math.floor(diff/60) + '분 전';
    if (diff < 86400) return Math.floor(diff/3600) + '시간 전';
    return Math.floor(diff/86400) + '일 전';
  }

  // 유튜브 URL → 임베드 ID 추출
  function getYoutubeId(url) {
    try {
      const u = new URL(url);
      if (u.hostname.includes("youtube.com")) return u.searchParams.get("v");
      if (u.hostname === "youtu.be") return u.pathname.slice(1);
    } catch(e) {}
    return null;
  }

  // 커뮤니티 목록 로드
  async function loadCommunities() {
    const { data, error } = await soolClient
      .from('communities')
      .select('*')
      .order('sort_order', { ascending: true });

    if (error || !data) return;
    communitiesData = data;

    // 커뮤니티 탭 목록 표시
    const list = document.getElementById('communities-list');
    list.innerHTML = data.map(c => `
      <div class="community-card" onclick="location.href='community-posts.html?id=${c.id}&name=${encodeURIComponent(c.name)}&icon=${encodeURIComponent(c.icon)}'">
        <div class="community-icon">${c.icon}</div>
        <div>
          <div class="community-name">${c.name}</div>
          <div class="community-desc">${c.description || ''}</div>
        </div>
      </div>
    `).join('');

    // 글쓰기 커뮤니티 선택 옵션 채우기
    const select = document.getElementById('post-community');
    if (select) {
      data.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.icon + ' ' + c.name;
        select.appendChild(opt);
      });
    }
  }

  // 자유게시판 게시글 로드
  async function loadPosts() {
    const { data, error } = await soolClient
      .from('posts')
      .select('*, users(nickname), communities(name, icon)')
      .order('created_at', { ascending: false })
      .limit(30);

    const list = document.getElementById('posts-list');
    if (error || !data || data.length === 0) {
      list.innerHTML = '<div class="empty">아직 게시글이 없어요. 첫 글을 작성해보세요! ✍️</div>';
      return;
    }
    list.innerHTML = data.map(p => `
      <div class="post-card" onclick="location.href='post-detail.html?id=${p.id}&from=community.html'">
        <div class="post-header">
          <div class="post-avatar">${p.communities?.icon || '💬'}</div>
          <div class="post-author">${p.users?.nickname || '익명'}</div>
          <span class="post-cat">${p.communities?.name || '—'}</span>
          <div class="post-time">${timeAgo(p.created_at)}</div>
        </div>
        <div class="post-title">${p.title}</div>
        <div class="post-body">${p.content.slice(0, 80)}${p.content.length > 80 ? '...' : ''}</div>
        ${p.image_url ? `<img src="${p.image_url}" style="width:100%;border-radius:8px;margin-top:8px;max-height:160px;object-fit:cover;" onerror="this.style.display='none'" />` : ''}
        <div class="post-footer">
          <span class="post-stat">👍 ${p.like_count}</span>
          <span class="post-stat">💬 ${p.comment_count}</span>
          <span class="post-stat">👁️ ${p.view_count}</span>
        </div>
      </div>
    `).join('');
  }

  async function submitPost() {
    const { data: { session } } = await soolClient.auth.getSession();
    if (!session) { location.href = 'auth.html'; return; }

    const communityId = document.getElementById('post-community').value;
    const title = document.getElementById('post-title').value.trim();
    const content = document.getElementById('post-content').value.trim();
    const imageUrl = document.getElementById('post-image').value.trim();
    const embedUrl = document.getElementById('post-embed').value.trim();

    if (!communityId) { showMsg('커뮤니티를 선택해주세요!', 'error'); return; }
    if (!title) { showMsg('제목을 입력해주세요!', 'error'); return; }
    if (!content) { showMsg('내용을 입력해주세요!', 'error'); return; }

    const { error } = await soolClient.from('posts').insert({
      user_id: session.user.id,
      community_id: communityId,
      title, content,
      image_url: imageUrl || null,
      embed_url: embedUrl || null,
      category: communitiesData.find(c => c.id === communityId)?.name || ''
    });

    if (error) { showMsg('등록 중 오류가 발생했어요.', 'error'); }
    else {
      showMsg('게시글이 등록됐어요! +30 XP 🎉', 'success');
      ['post-community','post-title','post-content','post-image','post-embed'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      setTimeout(() => {
        loadPosts();
        const postTab = document.querySelector('.tab:nth-child(2)');
        if (postTab) switchTab('posts', postTab);
      }, 1500);
    }
  }

  function showMsg(text, type) {
    const el = document.getElementById('write-msg');
    el.className = 'form-msg ' + type;
    el.textContent = text;
    setTimeout(() => { el.className = 'form-msg'; }, 3000);
  }

  async function initWriteTab() {
    const { data: { session } } = await soolClient.auth.getSession();
    if (!session) {
      document.getElementById('write-wrap').innerHTML = `
        <div class="empty"><a href="auth.html" style="color:var(--purple-400);text-decoration:none;">로그인</a> 후 글을 작성할 수 있어요</div>`;
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    loadCommunities();
    loadPosts();
    initWriteTab();
  });
</script>
</body>
</html>
