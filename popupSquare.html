<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팝업 광장 — 술향기마을</title>
<style>
  :root {
    --pink-50:  #FFF0F5;
    --pink-100: #FFB8D2;
    --pink-200: #FF6B9D;
    --pink-400: #D94F80;
    --pink-600: #A33060;
    --pink-900: #3D0E22;
    --purple-100: #E8D5FF;
    --purple-200: #B47FFF;
    --yellow-100: #FFF3B0;
    --yellow-200: #FFD93D;
    --teal-100:  #B2F0E8;
    --teal-200:  #2EC4B6;
    --bg: #FDF5F9;
    --bg-card: #ffffff;
    --text-primary: #1a0a12;
    --text-secondary: #6b3a52;
    --text-muted: #a07890;
    --border: rgba(0,0,0,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; }
  nav { background: var(--bg-card); border-bottom: 0.5px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .nav-back { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); text-decoration: none; cursor: pointer; }
  .nav-back:hover { color: var(--pink-400); }
  .nav-back svg { width: 16px; height: 16px; }
  .nav-logo { font-size: 15px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 7px; }
  .nav-logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--pink-200); }
  .nav-spacer { width: 80px; }
  .hero { background: linear-gradient(135deg, #FFF0F5 0%, #F0E8FF 50%, #FFF3B0 100%); border-bottom: 0.5px solid var(--border); padding: 28px 24px 24px; position: relative; overflow: hidden; }
  .hero-deco { position: absolute; font-size: 48px; opacity: 0.12; pointer-events: none; }
  .hero-deco-1 { top: -8px; right: 16px; transform: rotate(15deg); }
  .hero-deco-2 { bottom: -12px; right: 60px; transform: rotate(-10deg); font-size: 36px; }
  .hero-inner { max-width: 640px; margin: 0 auto; position: relative; }
  .hero-tag { display: inline-block; font-size: 11px; font-weight: 600; color: var(--pink-600); background: var(--pink-100); padding: 3px 10px; border-radius: 99px; margin-bottom: 10px; }
  .hero-title { font-size: 22px; font-weight: 700; color: var(--pink-900); margin-bottom: 6px; line-height: 1.3; }
  .hero-sub { font-size: 14px; color: var(--text-secondary); line-height: 1.65; margin-bottom: 16px; }
  .live-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--bg-card); border: 0.5px solid var(--border); border-radius: 99px; padding: 5px 12px; font-size: 12px; font-weight: 500; color: var(--text-primary); }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #EF4444; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .section { padding: 20px 24px; max-width: 640px; margin: 0 auto; }
  .section-title { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 14px; }
  .section-divider { border: none; border-top: 0.5px solid var(--border); margin: 4px 0; }
  .event-main { background: var(--bg-card); border: 0.5px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 10px; cursor: pointer; transition: box-shadow 0.15s; }
  .event-main:hover { box-shadow: 0 4px 16px rgba(212,79,128,0.12); }
  .event-banner { height: 80px; display: flex; align-items: center; justify-content: center; font-size: 36px; position: relative; }
  .event-status { position: absolute; top: 10px; left: 12px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 99px; }
  .status-live { background: #EF4444; color: #fff; }
  .status-soon { background: var(--yellow-200); color: #5a3d00; }
  .status-end  { background: var(--border); color: var(--text-muted); }
  .event-body { padding: 14px 16px; }
  .event-title { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
  .event-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.55; margin-bottom: 10px; }
  .event-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .event-meta-item { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-muted); }
  .event-meta-item svg { width: 13px; height: 13px; }
  .event-xp { display: inline-block; font-size: 11px; font-weight: 600; color: var(--pink-600); background: var(--pink-50); border: 0.5px solid var(--pink-100); padding: 2px 8px; border-radius: 99px; margin-left: auto; }
  .event-join-btn { margin-top: 10px; background: var(--pink-200); color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .event-join-btn.joined { background: var(--pink-50); color: var(--pink-600); cursor: default; }
  .event-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-bottom: 10px; }
  .event-small { background: var(--bg-card); border: 0.5px solid var(--border); border-radius: 12px; padding: 14px; cursor: pointer; transition: border-color 0.15s; }
  .event-small:hover { border-color: var(--pink-200); }
  .event-small-icon { font-size: 22px; margin-bottom: 8px; }
  .event-small-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 3px; }
  .event-small-desc { font-size: 11px; color: var(--text-muted); line-height: 1.45; }
  .event-small-status { margin-top: 8px; font-size: 11px; font-weight: 500; }
  .text-live  { color: #EF4444; }
  .text-soon  { color: #D97706; }
  .calendar-list { display: flex; flex-direction: column; gap: 8px; }
  .cal-item { display: flex; align-items: center; gap: 12px; background: var(--bg-card); border: 0.5px solid var(--border); border-radius: 10px; padding: 11px 14px; }
  .cal-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .cal-body { flex: 1; }
  .cal-title { font-size: 13px; font-weight: 500; color: var(--text-primary); margin-bottom: 2px; }
  .cal-when { font-size: 11px; color: var(--text-muted); }
  .cal-badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; white-space: nowrap; }
  .notice { background: var(--pink-50); border: 0.5px solid var(--pink-100); border-radius: 10px; padding: 12px 14px; font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 24px; }
  .notice strong { color: var(--pink-600); }
  .empty { text-align: center; padding: 24px 20px; color: var(--text-muted); font-size: 13px; }
  @media (max-width: 480px) { nav { padding: 12px 16px; } .hero { padding: 20px 16px 20px; } .section { padding: 16px 16px; } .event-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<nav>
  <a class="nav-back" onclick="goBack()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
    마을로 돌아가기
  </a>
  <div class="nav-logo"><div class="nav-logo-dot"></div>술향기마을</div>
  <div class="nav-spacer"></div>
</nav>

<div class="hero">
  <div class="hero-deco hero-deco-1">🎪</div>
  <div class="hero-deco hero-deco-2">🎉</div>
  <div class="hero-inner">
    <div class="hero-tag">팝업 광장 · 이벤트 & 체험</div>
    <h1 class="hero-title">지금 마을에서 무슨 일이?</h1>
    <p class="hero-sub">한정 팝업, 시즌 이벤트, 특별 체험까지.<br>광장에서는 항상 새로운 일이 일어나고 있어요.</p>
    <div class="live-badge">
      <div class="live-dot"></div>
      <span id="live-count-text">불러오는 중...</span>
    </div>
  </div>
</div>

<div class="section" style="margin-top:16px;">
  <p class="section-title">지금 진행 중</p>
  <div id="main-events"><div class="empty">불러오는 중...</div></div>
</div>

<hr class="section-divider">

<div class="section">
  <p class="section-title">곧 시작해요</p>
  <div class="event-grid" id="small-events"><div class="empty">불러오는 중...</div></div>
</div>

<hr class="section-divider">

<div class="section">
  <p class="section-title">정기 이벤트 일정</p>
  <div class="calendar-list" id="calendar-events"><div class="empty">불러오는 중...</div></div>
</div>

<div class="section">
  <div class="notice">
    <strong>팝업 광장 이벤트 주최권</strong>은 레벨 시스템 도입 후 일정 레벨 이상 유저에게 개방될 예정이에요.<br>
    지금은 마을 운영진이 등록한 이벤트에 자유롭게 참여해보세요! 🎪
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/core/supabase.js"></script>
<script>
  let currentUser = null;
  const gradients = [
    'linear-gradient(135deg, #FFF3B0, #FFD93D)',
    'linear-gradient(135deg, #B2F0E8, #2EC4B6, #0A8A80)',
    'linear-gradient(135deg, #E8D5FF, #B47FFF)',
    'linear-gradient(135deg, #FFE4E6, #FF6B9D)',
  ];
  const calColors = [
    { bg: '#FFF3B0', text: '#856404' },
    { bg: '#E8D5FF', text: '#5B21B6' },
    { bg: '#B2F0E8', text: '#065F46' },
    { bg: '#FFE4E6', text: '#9F1239' },
  ];

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }
  function goBack() { location.href = 'index.html'; }

  function getStatus(ev) {
    const now = new Date();
    if (ev.start_date && now < new Date(ev.start_date)) return 'soon';
    if (ev.end_date && now > new Date(ev.end_date)) return 'end';
    return 'live';
  }
  function formatDeadline(ev) {
    if (ev.end_date) {
      const d = new Date(ev.end_date);
      return `~${d.getMonth() + 1}월 ${d.getDate()}일`;
    }
    return '';
  }
  function formatOpenDate(ev) {
    if (ev.start_date) {
      const d = new Date(ev.start_date);
      return `${d.getMonth() + 1}월 ${d.getDate()}일 오픈`;
    }
    return '';
  }

  async function init() {
    const { data: { session } } = await soolClient.auth.getSession();
    if (session) {
      const { data: user } = await soolClient.from('users').select('id, nickname').eq('id', session.user.id).single();
      currentUser = user;
    }
    await loadMainEvents();
    await loadSmallEvents();
    await loadCalendarEvents();
  }

  async function loadMainEvents() {
    const { data, error } = await soolClient.from('popup_events').select('*').eq('event_type', 'main').order('created_at', { ascending: false });
    const wrap = document.getElementById('main-events');
    if (error) { wrap.innerHTML = '<div class="empty">불러오지 못했어요</div>'; return; }
    if (!data || data.length === 0) {
      wrap.innerHTML = '<div class="empty">진행 중인 이벤트가 없어요</div>';
      document.getElementById('live-count-text').textContent = '현재 진행 중인 이벤트 없음';
      return;
    }

    let myJoined = [];
    if (currentUser) {
      const { data: joined } = await soolClient.from('popup_event_participants').select('event_id').eq('user_id', currentUser.id);
      myJoined = (joined || []).map(j => j.event_id);
    }

    const liveCount = data.filter(ev => getStatus(ev) === 'live').length;
    document.getElementById('live-count-text').textContent = `현재 ${liveCount}개 이벤트 진행 중`;

    const cards = await Promise.all(data.map(async (ev, i) => {
      const status = getStatus(ev);
      const statusLabel = { live: 'LIVE', soon: '예정', end: '종료' }[status];
      const statusClass = { live: 'status-live', soon: 'status-soon', end: 'status-end' }[status];
      const { count } = await soolClient.from('popup_event_participants').select('id', { count: 'exact', head: true }).eq('event_id', ev.id);
      const joined = myJoined.includes(ev.id);
      return `
        <div class="event-main">
          <div class="event-banner" style="background:${gradients[i % gradients.length]};">
            ${esc(ev.emoji || '🎉')}
            <span class="event-status ${statusClass}">${statusLabel}</span>
          </div>
          <div class="event-body">
            <div class="event-title">${esc(ev.title)}</div>
            <div class="event-desc">${esc(ev.description || '')}</div>
            <div class="event-meta">
              <div class="event-meta-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                ${formatDeadline(ev) || '상시'}
              </div>
              <div class="event-meta-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                ${count || 0}명 참여 중
              </div>
              ${ev.xp_reward > 0 ? `<div class="event-xp">+${ev.xp_reward} XP</div>` : ''}
            </div>
            <button class="event-join-btn ${joined ? 'joined' : ''}" onclick="event.stopPropagation();${joined ? '' : `joinEvent('${ev.id}')`}">${joined ? '참여 완료 ✓' : '참여하기'}</button>
          </div>
        </div>
      `;
    }));
    wrap.innerHTML = cards.join('');
  }

  async function joinEvent(id) {
    if (!currentUser) { alert('로그인 후 참여할 수 있어요'); location.href = 'auth.html'; return; }
    const { error } = await soolClient.from('popup_event_participants').insert({ event_id: id, user_id: currentUser.id });
    if (error) { console.error('참여 실패:', error); return; }
    await loadMainEvents();
  }

  async function loadSmallEvents() {
    const { data, error } = await soolClient.from('popup_events').select('*').eq('event_type', 'small').order('start_date', { ascending: true });
    const wrap = document.getElementById('small-events');
    if (error) { wrap.innerHTML = '<div class="empty">불러오지 못했어요</div>'; return; }
    if (!data || data.length === 0) { wrap.innerHTML = '<div class="empty">예정된 이벤트가 없어요</div>'; return; }

    wrap.innerHTML = data.map(ev => {
      const status = getStatus(ev);
      const statusText = status === 'live' ? '🔴 진행 중' : (status === 'end' ? '종료됨' : `⏰ ${formatOpenDate(ev)}`);
      const statusClass = status === 'live' ? 'text-live' : (status === 'end' ? '' : 'text-soon');
      return `
        <div class="event-small">
          <div class="event-small-icon">${esc(ev.emoji || '🎈')}</div>
          <div class="event-small-title">${esc(ev.title)}</div>
          <div class="event-small-desc">${esc(ev.description || '')}</div>
          <div class="event-small-status ${statusClass}">${statusText}</div>
        </div>
      `;
    }).join('');
  }

  async function loadCalendarEvents() {
    const { data, error } = await soolClient.from('popup_events').select('*').eq('event_type', 'calendar').order('created_at', { ascending: true });
    const wrap = document.getElementById('calendar-events');
    if (error) { wrap.innerHTML = '<div class="empty">불러오지 못했어요</div>'; return; }
    if (!data || data.length === 0) { wrap.innerHTML = '<div class="empty">등록된 정기 일정이 없어요</div>'; return; }

    wrap.innerHTML = data.map((ev, i) => {
      const c = calColors[i % calColors.length];
      return `
        <div class="cal-item">
          <div class="cal-icon" style="background:${c.bg};">${esc(ev.emoji || '📅')}</div>
          <div class="cal-body">
            <div class="cal-title">${esc(ev.title)}</div>
            <div class="cal-when">${esc(ev.recurrence_label || '')}</div>
          </div>
          <span class="cal-badge" style="background:${c.bg};color:${c.text};">${esc(ev.description || '')}</span>
        </div>
      `;
    }).join('');
  }

  init();
</script>

</body>
</html>
