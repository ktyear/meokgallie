<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>게시글 — 술향기마을</title>
<style>
  :root{--purple-50:#F3EEFF;--purple-100:#D4B8FF;--purple-200:#9966FF;--purple-400:#7744DD;--purple-600:#5522AA;--bg:#F2EEFB;--bg-card:#fff;--text-primary:#100820;--text-secondary:#4a3868;--text-muted:#8878aa;--border:rgba(0,0,0,0.07);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;}
  nav{background:var(--bg-card);border-bottom:0.5px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .nav-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);cursor:pointer;}.nav-back:hover{color:var(--purple-400);}.nav-back svg{width:16px;height:16px;}
  .nav-logo{font-size:15px;font-weight:600;display:flex;align-items:center;gap:7px;}
  .nav-logo-dot{width:8px;height:8px;border-radius:50%;background:var(--purple-200);}
  .nav-spacer{width:80px;}
  .content{max-width:640px;margin:0 auto;padding:20px 24px 40px;}
  .post-cat{font-size:11px;background:var(--purple-50);color:var(--purple-600);padding:3px 10px;border-radius:99px;font-weight:500;display:inline-block;margin-bottom:10px;}
  .post-title{font-size:20px;font-weight:700;color:var(--text-primary);margin-bottom:10px;line-height:1.4;}
  .post-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);margin-bottom:16px;flex-wrap:wrap;}
  .post-body{font-size:14px;color:var(--text-secondary);line-height:1.8;margin-bottom:20px;white-space:pre-wrap;}
  .post-actions{display:flex;gap:8px;margin-bottom:24px;}
  .like-btn{display:flex;align-items:center;gap:5px;font-size:13px;background:var(--bg-card);border:0.5px solid var(--border);border-radius:99px;padding:7px 16px;cursor:pointer;font-family:inherit;transition:all 0.15s;}
  .like-btn:hover{border-color:var(--purple-200);}
  .like-btn.liked{background:var(--purple-50);border-color:var(--purple-200);color:var(--purple-400);}
  .divider{height:0.5px;background:var(--border);margin-bottom:20px;}
  .comment-title{font-size:13px;font-weight:600;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:14px;}
  .comment-item{padding:12px 0;border-bottom:0.5px solid var(--border);}
  .comment-item:last-child{border-bottom:none;}
  .comment-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .comment-nick{font-size:12px;font-weight:600;color:var(--text-secondary);}
  .comment-time{font-size:11px;color:var(--text-muted);margin-left:auto;}
  .comment-body{font-size:13px;color:var(--text-secondary);line-height:1.6;}
  .comment-form{margin-top:16px;display:flex;flex-direction:column;gap:8px;}
  .comment-input{width:100%;background:var(--bg);border:0.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text-primary);font-family:inherit;resize:none;height:72px;outline:none;transition:border-color 0.15s;}
  .comment-input:focus{border-color:var(--purple-200);}
  .comment-input::placeholder{color:var(--text-muted);}
  .comment-submit{align-self:flex-end;background:var(--purple-200);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background 0.15s;}
  .comment-submit:hover{background:var(--purple-400);}
  .empty{text-align:center;padding:20px;color:var(--text-muted);font-size:13px;}
  .delete-btn{display:flex;align-items:center;gap:5px;font-size:13px;background:rgba(248,113,113,0.1);border:0.5px solid rgba(248,113,113,0.3);border-radius:99px;padding:7px 16px;cursor:pointer;font-family:inherit;color:#dc2626;transition:all 0.15s;}
  .delete-btn:hover{background:rgba(248,113,113,0.2);}
  #page-loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;}
  #page-loading.hide{display:none;}
  @media(max-width:480px){nav{padding:12px 16px;}.content{padding:16px 16px 32px;}}
</style>
</head>
<body>

<div id="page-loading">
  <div style="font-size:13px;color:var(--text-muted);">불러오는 중...</div>
</div>

<nav>
  <a class="nav-back" onclick="goBack()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
    뒤로가기
  </a>
  <div class="nav-logo"><div class="nav-logo-dot"></div>술향기마을</div>
  <div class="nav-spacer"></div>
</nav>

<div class="content">
  <span class="post-cat" id="p-category">—</span>
  <div class="post-title" id="p-title">—</div>
  <div class="post-meta">
    <span id="p-author"></span>
    <span>·</span>
    <span id="p-time"></span>
    <span>·</span>
    <span id="p-views"></span>
  </div>
  <div class="post-body" id="p-body"></div>
  <div class="post-actions" id="post-actions">
    <button class="like-btn" id="like-btn" onclick="toggleLike()">👍 <span id="like-count">0</span></button>
  </div>
  <div class="divider"></div>
  <div class="comment-title">댓글 <span id="comment-count"></span></div>
  <div id="comments-list"><div class="empty">불러오는 중...</div></div>
  <div class="comment-form" id="comment-form">
    <textarea class="comment-input" id="comment-input" placeholder="댓글을 작성해주세요..."></textarea>
    <button class="comment-submit" onclick="submitComment()">댓글 등록</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/core/supabase.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const postId = params.get('id');
  let currentUser = null;

  // XSS 방지
  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str == null ? '' : String(str);
    return d.innerHTML;
  }
  let isLiked = false;

  function goBack() {
    const from = params.get('from');
    // 외부 URL(스킴, 프로토콜 상대경로) 차단하고, 허용된 내부 페이지로 시작할 때만 사용
    const allowedPrefixes = ['community.html', 'community-posts.html', 'library.html', 'admin.html'];
    const isSafe = from && !from.includes('://') && !from.startsWith('//') && allowedPrefixes.some(p => from.startsWith(p));
    location.href = isSafe ? from : 'community.html';
  }

  function timeAgo(dateStr) {
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
    if (diff < 60) return '방금 전';
    if (diff < 3600) return Math.floor(diff/60) + '분 전';
    if (diff < 86400) return Math.floor(diff/3600) + '시간 전';
    return Math.floor(diff/86400) + '일 전';
  }

  async function init() {
    if (!postId) { location.href = 'community.html'; return; }
    const { data: { session } } = await soolClient.auth.getSession();
    if (session) {
      const { data: user } = await soolClient.from('users').select('id, nickname').eq('id', session.user.id).single();
      currentUser = user;
    } else {
      document.getElementById('comment-form').innerHTML = `<div class="empty"><a href="auth.html" style="color:var(--purple-400);text-decoration:none;">로그인</a> 후 댓글을 작성할 수 있어요</div>`;
    }
    await loadPost();
    await loadComments();
    document.getElementById('page-loading').classList.add('hide');
  }

  async function loadPost() {
    // 조회수 증가
    const { data } = await soolClient.from('posts').select('*, users(nickname)').eq('id', postId).single();
    if (!data) { location.href = 'community.html'; return; }

    await soolClient.from('posts').update({ view_count: (data.view_count || 0) + 1 }).eq('id', postId);

    document.title = data.title + ' — 술향기마을';
    document.getElementById('p-category').textContent = data.category;
    document.getElementById('p-title').textContent = data.title;
    document.getElementById('p-author').textContent = '@' + (data.users?.nickname || '익명');
    document.getElementById('p-time').textContent = timeAgo(data.created_at);
    document.getElementById('p-views').textContent = '👁️ ' + (data.view_count + 1);
    document.getElementById('p-body').textContent = data.content;
    document.getElementById('like-count').textContent = data.like_count;

    // 본인 글이면 삭제 버튼 표시
    if (currentUser && currentUser.id === data.user_id) {
      const actions = document.getElementById('post-actions');
      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'delete-btn';
      deleteBtn.innerHTML = '🗑️ 삭제';
      deleteBtn.onclick = deletePost;
      actions.appendChild(deleteBtn);
    }

    // 좋아요 여부 확인
    if (currentUser) {
      const { data: liked } = await soolClient.from('post_likes')
        .select('id').eq('post_id', postId).eq('user_id', currentUser.id).single();
      if (liked) {
        isLiked = true;
        document.getElementById('like-btn').classList.add('liked');
      }
    }
  }

  async function deletePost() {
    if (!confirm('게시글을 삭제할까요?')) return;
    await soolClient.from('posts').delete().eq('id', postId);
    location.href = params.get('from') || 'community.html';
  }

  async function toggleLike() {
    if (!currentUser) { location.href = 'auth.html'; return; }
    const btn = document.getElementById('like-btn');
    const countEl = document.getElementById('like-count');
    const count = parseInt(countEl.textContent);

    if (isLiked) {
      await soolClient.from('post_likes').delete().eq('post_id', postId).eq('user_id', currentUser.id);
      await soolClient.from('posts').update({ like_count: count - 1 }).eq('id', postId);
      countEl.textContent = count - 1;
      btn.classList.remove('liked');
      isLiked = false;
    } else {
      await soolClient.from('post_likes').insert({ post_id: postId, user_id: currentUser.id });
      await soolClient.from('posts').update({ like_count: count + 1 }).eq('id', postId);
      countEl.textContent = count + 1;
      btn.classList.add('liked');
      isLiked = true;
    }
  }

  async function loadComments() {
    const { data } = await soolClient.from('comments')
      .select('*, users(nickname)').eq('post_id', postId).order('created_at', { ascending: true });

    const list = document.getElementById('comments-list');
    document.getElementById('comment-count').textContent = (data?.length || 0) + '개';

    if (!data || data.length === 0) {
      list.innerHTML = '<div class="empty">아직 댓글이 없어요. 첫 댓글을 남겨보세요!</div>';
      return;
    }
    list.innerHTML = data.map(c => `
      <div class="comment-item">
        <div class="comment-header">
          <span class="comment-nick">@${esc(c.users?.nickname) || '익명'}</span>
          <span class="comment-time">${timeAgo(c.created_at)}</span>
        </div>
        <div class="comment-body">${esc(c.content)}</div>
      </div>
    `).join('');
  }

  async function submitComment() {
    if (!currentUser) { location.href = 'auth.html'; return; }
    const content = document.getElementById('comment-input').value.trim();
    if (!content) return;

    const { error } = await soolClient.from('comments').insert({
      post_id: postId, user_id: currentUser.id, content
    });
    if (!error) {
      // 댓글 수 업데이트
      const { data } = await soolClient.from('comments').select('id').eq('post_id', postId);
      await soolClient.from('posts').update({ comment_count: data?.length || 0 }).eq('id', postId);
      document.getElementById('comment-input').value = '';
      loadComments();
    }
  }

  init();
</script>
</body>
</html>
