<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영상관 — 술향기마을</title>
<style>
  :root{--pink-50:#FFF0F8;--pink-100:#FFB8DC;--pink-200:#FF1493;--pink-400:#CC0070;--bg:#FDF0F8;--bg-card:#fff;--text-primary:#200010;--text-secondary:#680040;--text-muted:#A06080;--border:rgba(0,0,0,0.07);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;}
  nav{background:var(--bg-card);border-bottom:0.5px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .nav-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);cursor:pointer;}.nav-back:hover{color:var(--pink-400);}.nav-back svg{width:16px;height:16px;}
  .nav-logo{font-size:15px;font-weight:600;display:flex;align-items:center;gap:7px;}
  .nav-logo-dot{width:8px;height:8px;border-radius:50%;background:var(--pink-200);}
  .nav-spacer{width:80px;}
  .content{max-width:640px;margin:0 auto;padding:16px 24px 40px;}
  .video-wrap{width:100%;aspect-ratio:16/9;background:#000;border-radius:12px;overflow:hidden;margin-bottom:16px;}
  .video-wrap iframe{width:100%;height:100%;border:none;}
  .thumb-wrap{width:100%;aspect-ratio:16/9;border-radius:12px;overflow:hidden;margin-bottom:16px;position:relative;cursor:pointer;background:#000;}
  .thumb-wrap img{width:100%;height:100%;object-fit:cover;}
  .thumb-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.35);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
  .thumb-play{width:64px;height:64px;background:rgba(255,20,147,0.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;}
  .thumb-label{color:#fff;font-size:13px;font-weight:600;background:rgba(0,0,0,0.5);padding:5px 14px;border-radius:99px;}
  .no-video{width:100%;aspect-ratio:16/9;background:#1a0010;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:48px;margin-bottom:16px;}
  .section{margin-bottom:16px;background:var(--bg-card);border:0.5px solid var(--border);border-radius:12px;padding:16px 18px;}
  .post-type{font-size:11px;font-weight:600;color:var(--pink-400);background:var(--pink-50);padding:3px 10px;border-radius:99px;display:inline-block;margin-bottom:8px;}
  .post-title{font-size:20px;font-weight:700;color:var(--text-primary);margin-bottom:6px;line-height:1.4;}
  .post-meta{font-size:12px;color:var(--text-muted);margin-bottom:12px;}
  .post-body{font-size:14px;color:var(--text-secondary);line-height:1.8;white-space:pre-wrap;}
  .actions{display:flex;gap:8px;margin-top:14px;}
  .like-btn{display:flex;align-items:center;gap:5px;font-size:13px;background:var(--bg-card);border:0.5px solid var(--border);border-radius:99px;padding:7px 16px;cursor:pointer;font-family:inherit;transition:all 0.15s;}
  .like-btn:hover{border-color:var(--pink-200);}
  .like-btn.liked{background:var(--pink-50);border-color:var(--pink-200);color:var(--pink-400);}
  .comment-title{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:12px;}
  .comment-item{padding:10px 0;border-bottom:0.5px solid var(--border);}
  .comment-item:last-child{border-bottom:none;}
  .comment-header{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
  .comment-nick{font-size:12px;font-weight:600;color:var(--text-secondary);}
  .comment-time{font-size:11px;color:var(--text-muted);margin-left:auto;}
  .comment-body{font-size:13px;color:var(--text-secondary);line-height:1.6;}
  .comment-form{margin-top:12px;display:flex;flex-direction:column;gap:8px;}
  .comment-input{width:100%;background:var(--bg);border:0.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text-primary);font-family:inherit;resize:none;height:72px;outline:none;transition:border-color 0.15s;}
  .comment-input:focus{border-color:var(--pink-200);}
  .comment-input::placeholder{color:var(--text-muted);}
  .comment-submit{align-self:flex-end;background:var(--pink-200);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
  .empty{text-align:center;padding:20px;color:var(--text-muted);font-size:13px;}
  #page-loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;}
  #page-loading.hide{display:none;}
  @media(max-width:480px){nav{padding:12px 16px;}.content{padding:12px 16px 32px;}}
</style>
</head>
<body>

<div id="page-loading">
  <div style="font-size:13px;color:var(--text-muted);">불러오는 중...</div>
</div>

<nav>
  <a class="nav-back" onclick="goBack()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
    뒤로가기
  </a>
  <div class="nav-logo"><div class="nav-logo-dot"></div>술향기마을</div>
  <div class="nav-spacer"></div>
</nav>

<div class="content">
  <!-- 영상 -->
  <div id="video-area"></div>

  <!-- 게시글 정보 -->
  <div class="section">
    <span class="post-type" id="p-type">—</span>
    <div class="post-title" id="p-title">—</div>
    <div class="post-meta" id="p-meta"></div>
    <div class="post-body" id="p-body"></div>
    <div class="actions">
      <button class="like-btn" id="like-btn" onclick="toggleLike()">👍 <span id="like-count">0</span></button>
    </div>
  </div>

  <!-- 댓글 -->
  <div class="section">
    <div class="comment-title">댓글 <span id="comment-count"></span></div>
    <div id="comments-list"><div class="empty">불러오는 중...</div></div>
    <div id="comment-form-wrap">
      <div class="comment-form">
        <textarea class="comment-input" id="comment-input" placeholder="댓글을 작성해주세요..."></textarea>
        <button class="comment-submit" onclick="submitComment()">댓글 등록</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/core/supabase.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const postId = params.get('id');
  let currentUser = null;
  let postData = null;
  let isLiked = false;
  let isTogglingLike = false;

  const typeLabels = { trending: '🔥 트렌딩', recipe: '🍸 레시피', upload: '📹 유저 영상' };

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  function getYoutubeId(url) {
    try {
      const u = new URL(url);
      if (u.hostname.includes('youtube.com')) return u.searchParams.get('v');
      if (u.hostname === 'youtu.be') return u.pathname.slice(1);
    } catch(e) {}
    return null;
  }

  function timeAgo(dateStr) {
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
    if (diff < 60) return '방금 전';
    if (diff < 3600) return Math.floor(diff/60) + '분 전';
    if (diff < 86400) return Math.floor(diff/3600) + '시간 전';
    return Math.floor(diff/86400) + '일 전';
  }

  function playVideo(embedUrl) {
    const wrap = document.getElementById('thumb-wrap');
    if (!wrap) return;
    wrap.outerHTML = `<div class="video-wrap" style="margin-bottom:16px;"><iframe src="${embedUrl}" allowfullscreen allow="autoplay"></iframe></div>`;
  }

  function goBack() {
    const from = params.get('from');
    location.href = from || 'studio.html';
  }

  async function init() {
    if (!postId) { location.href = 'studio.html'; return; }

    const { data: { session } } = await soolClient.auth.getSession();
    if (session) {
      const { data: user } = await soolClient.from('users').select('id, nickname').eq('id', session.user.id).single();
      currentUser = user;
    } else {
      document.getElementById('comment-form-wrap').innerHTML = `<div class="empty"><a href="auth.html" style="color:var(--pink-400);text-decoration:none;">로그인</a> 후 댓글을 작성할 수 있어요</div>`;
    }

    await loadPost();
    document.getElementById('page-loading').classList.add('hide');
  }

  async function loadPost() {
    const { data, error } = await soolClient.from('studio_posts').select('*, users(nickname)').eq('id', postId).single();
    if (error) { console.error('게시글 로드 실패:', error); }
    if (!data) { location.href = 'studio.html'; return; }
    postData = data;

    // 조회수 증가
    await soolClient.from('studio_posts').update({ view_count: (data.view_count || 0) + 1 }).eq('id', postId);

    document.title = data.title + ' — 술향기마을';

    // 영상 표시
    const videoArea = document.getElementById('video-area');
    if (data.video_url) {
      const ytId = getYoutubeId(data.video_url);
      if (ytId) {
        const thumb = `https://img.youtube.com/vi/${ytId}/maxresdefault.jpg`;
        const embedUrl = `https://www.youtube.com/embed/${ytId}?autoplay=1`;

        // 썸네일 클릭 시 임베드로 전환
        videoArea.innerHTML = `
          <div class="thumb-wrap" id="thumb-wrap" onclick="playVideo('${embedUrl}')">
            <img src="${thumb}" onerror="this.src='https://img.youtube.com/vi/${ytId}/mqdefault.jpg'">
            <div class="thumb-overlay">
              <div class="thumb-play">▶</div>
              <div class="thumb-label">클릭하여 재생</div>
            </div>
          </div>`;
      } else {
        // 유튜브가 아닌 외부 링크
        videoArea.innerHTML = `
          <div class="no-video" style="flex-direction:column;gap:12px;cursor:pointer;" onclick="window.open('${data.video_url}', '_blank')">
            <span style="font-size:48px;">🎬</span>
            <span style="font-size:13px;color:rgba(255,255,255,0.7);">클릭하여 외부 영상 보기</span>
          </div>`;
      }
    } else {
      videoArea.innerHTML = `<div class="no-video">🎬</div>`;
    }

    document.getElementById('p-type').textContent = typeLabels[data.type] || '영상';
    document.getElementById('p-title').textContent = data.title;
    document.getElementById('p-meta').textContent = '@' + (data.users?.nickname || '술향기마을') + ' · ' + timeAgo(data.created_at);
    document.getElementById('p-body').textContent = data.content || '';
    document.getElementById('like-count').textContent = data.like_count || 0;

    // 좋아요 상태 확인
    if (currentUser) {
      const { data: liked } = await soolClient.from('studio_likes').select('id').eq('post_id', postId).eq('user_id', currentUser.id).single();
      if (liked) {
        isLiked = true;
        document.getElementById('like-btn').classList.add('liked');
      }
    }

    await loadComments();
  }

  async function toggleLike() {
    if (!currentUser || !postId) { location.href = 'auth.html'; return; }
    if (isTogglingLike) return;
    isTogglingLike = true;

    const btn = document.getElementById('like-btn');
    const countEl = document.getElementById('like-count');
    const count = parseInt(countEl.textContent);

    if (isLiked) {
      await soolClient.from('studio_likes').delete().eq('post_id', postId).eq('user_id', currentUser.id);
      await soolClient.from('studio_posts').update({ like_count: count - 1 }).eq('id', postId);
      countEl.textContent = count - 1;
      btn.classList.remove('liked');
      isLiked = false;
    } else {
      await soolClient.from('studio_likes').insert({ post_id: postId, user_id: currentUser.id });
      await soolClient.from('studio_posts').update({ like_count: count + 1 }).eq('id', postId);
      countEl.textContent = count + 1;
      btn.classList.add('liked');
      isLiked = true;
    }
    isTogglingLike = false;
  }

  async function loadComments() {
    const { data } = await soolClient.from('studio_comments').select('*, users(nickname)').eq('post_id', postId).order('created_at', { ascending: true });
    const list = document.getElementById('comments-list');
    document.getElementById('comment-count').textContent = (data?.length || 0) + '개';

    if (!data || data.length === 0) {
      list.innerHTML = '<div class="empty">아직 댓글이 없어요. 첫 댓글을 남겨보세요!</div>';
      return;
    }
    list.innerHTML = data.map(c => `
      <div class="comment-item">
        <div class="comment-header">
          <span class="comment-nick">@${esc(c.users?.nickname || '익명')}</span>
          <span class="comment-time">${timeAgo(c.created_at)}</span>
        </div>
        <div class="comment-body">${esc(c.content)}</div>
      </div>
    `).join('');
  }

  async function submitComment() {
    if (!currentUser || !postId) return;
    const content = document.getElementById('comment-input').value.trim();
    if (!content) return;

    const { error } = await soolClient.from('studio_comments').insert({ post_id: postId, user_id: currentUser.id, content });
    if (error) { console.error('댓글 등록 실패:', error); return; }
    await soolClient.from('studio_posts').update({ comment_count: (postData?.comment_count || 0) + 1 }).eq('id', postId);
    if (postData) postData.comment_count = (postData.comment_count || 0) + 1;
    document.getElementById('comment-input').value = '';
    loadComments();
  }

  init();
</script>
</body>
</html>
