<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>술 바 — 술향기마을</title>
<style>
  :root {
    --red-50:#FFF0EE;--red-100:#FFBCB0;--red-200:#E8522A;--red-400:#C03A18;
    --red-600:#8A2210;--red-900:#3A0E04;
    --bg:#FBF2EE;--bg-card:#fff;--text-primary:#1a0a04;
    --text-secondary:#6b3a2e;--text-muted:#a07868;--border:rgba(0,0,0,0.07);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;}
  nav{background:var(--bg-card);border-bottom:0.5px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .nav-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);text-decoration:none;cursor:pointer;}
  .nav-back:hover{color:var(--red-400);}
  .nav-back svg{width:16px;height:16px;}
  .nav-logo{font-size:15px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:7px;}
  .nav-logo-dot{width:8px;height:8px;border-radius:50%;background:var(--red-200);}
  .nav-spacer{width:80px;}
  .hero{background:linear-gradient(135deg,#2a0e04 0%,#5a1a0a 100%);padding:32px 24px 28px;border-bottom:0.5px solid var(--border);}
  .hero-inner{max-width:640px;margin:0 auto;}
  .hero-tag{display:inline-block;font-size:11px;font-weight:600;color:#FFBCB0;background:rgba(255,255,255,0.1);padding:3px 10px;border-radius:99px;margin-bottom:10px;}
  .hero-title{font-size:24px;font-weight:700;color:#fff;margin-bottom:6px;}
  .hero-sub{font-size:14px;color:rgba(255,255,255,0.7);line-height:1.65;}
  .section{padding:20px 24px;max-width:640px;margin:0 auto;}
  .section-title{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:14px;}
  .tabs{background:var(--bg-card);border-bottom:0.5px solid var(--border);display:flex;overflow-x:auto;justify-content:center;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{padding:12px 18px;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all 0.15s;}
  .tab.active{color:var(--red-400);border-bottom-color:var(--red-200);}
  .tab-content{display:none;}.tab-content.active{display:block;}
  .review-card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color 0.15s;}
  .review-card:hover{border-color:var(--red-200);}
  .review-header{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .review-emoji{font-size:22px;}
  .review-name{font-size:14px;font-weight:600;flex:1;}
  .review-rating{color:var(--red-200);font-size:13px;}
  .review-body{font-size:13px;color:var(--text-secondary);line-height:1.55;margin-bottom:8px;}
  .review-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .tag{font-size:11px;color:var(--text-muted);background:var(--bg);border:0.5px solid var(--border);padding:2px 8px;border-radius:99px;}
  .review-date{font-size:11px;color:var(--text-muted);margin-left:auto;}
  .drink-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;}
  .drink-card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:border-color 0.15s;}
  .drink-card:hover{border-color:var(--red-200);}
  .drink-icon{font-size:28px;margin-bottom:8px;}
  .drink-name-row{display:flex;align-items:center;gap:6px;margin-bottom:2px;}
  .drink-name{font-size:13px;font-weight:600;color:var(--text-primary);}
  .drink-abv{font-size:11px;color:var(--red-400);font-weight:500;white-space:nowrap;}
  .drink-category{font-size:11px;color:var(--red-200);font-weight:500;margin-bottom:4px;}
  .drink-desc{font-size:11px;color:var(--text-muted);line-height:1.4;}
  .drink-rating{font-size:12px;color:var(--red-200);margin-top:6px;}
  .write-btn{width:100%;background:var(--red-200);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;transition:background 0.15s;}
  .write-btn:hover{background:var(--red-400);}
  .write-form{display:flex;flex-direction:column;gap:14px;}
  .write-label{font-size:11px;color:var(--text-muted);letter-spacing:0.06em;margin-bottom:6px;}
  .drink-search{width:100%;background:var(--bg);border:0.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text-primary);font-family:inherit;outline:none;transition:border-color 0.15s;}
  .drink-search:focus{border-color:var(--red-200);}
  .drink-search::placeholder{color:var(--text-muted);}
  .search-results{background:var(--bg-card);border:0.5px solid var(--border);border-radius:8px;overflow:hidden;display:none;}
  .search-item{padding:10px 12px;font-size:13px;cursor:pointer;border-bottom:0.5px solid var(--border);transition:background 0.15s;}
  .search-item:last-child{border-bottom:none;}
  .search-item:hover{background:var(--bg);}
  .search-item-name{font-weight:600;color:var(--text-primary);}
  .search-item-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
  .selected-drink{background:var(--red-50);border:0.5px solid var(--red-100);border-radius:8px;padding:10px 12px;display:none;align-items:center;justify-content:space-between;}
  .selected-drink-name{font-size:13px;font-weight:600;color:var(--red-400);}
  .selected-drink-clear{font-size:12px;color:var(--text-muted);cursor:pointer;background:none;border:none;font-family:inherit;}
  .star-row{display:flex;gap:8px;}
  .star-btn-lg{font-size:32px;cursor:pointer;color:var(--border);transition:color 0.1s;background:none;border:none;padding:0;}
  .star-btn-lg.active{color:#FFD700;}
  .taste-tags{display:flex;flex-wrap:wrap;gap:6px;}
  .taste-tag{font-size:11px;color:var(--text-muted);background:var(--bg);border:0.5px solid var(--border);padding:4px 10px;border-radius:99px;cursor:pointer;transition:all 0.15s;user-select:none;}
  .taste-tag.selected{background:var(--red-50);border-color:var(--red-200);color:var(--red-400);}
  .review-input{width:100%;background:var(--bg);border:0.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text-primary);font-family:inherit;resize:none;height:80px;outline:none;transition:border-color 0.15s;}
  .review-input:focus{border-color:var(--red-200);}
  .review-input::placeholder{color:var(--text-muted);}
  .form-msg{font-size:12px;text-align:center;padding:6px;border-radius:8px;display:none;}
  .form-msg.success{display:block;background:rgba(74,222,128,0.1);color:#16a34a;}
  .form-msg.error{display:block;background:rgba(239,68,68,0.1);color:#dc2626;}
  @media(max-width:480px){nav{padding:12px 16px;}.hero{padding:20px 16px 20px;}.section{padding:16px;}.drink-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<nav>
  <a class="nav-back" onclick="goBack()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
    마을로 돌아가기
  </a>
  <div class="nav-logo"><div class="nav-logo-dot"></div>술향기마을</div>
  <div class="nav-spacer"></div>
</nav>
<div class="hero">
  <div class="hero-inner">
    <div class="hero-tag">술 바 · 리뷰 & 미디어</div>
    <h1 class="hero-title">🍸 술 바</h1>
    <p class="hero-sub">모든 주류의 리뷰와 테이스팅 노트.<br>전문 바텐더의 추천과 유저 평점을 한곳에서.</p>
  </div>
</div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('reviews',this)">최신 리뷰</div>
  <div class="tab" onclick="switchTab('drinks',this)">주류 탐색</div>
  <div class="tab" onclick="switchTab('write',this)">리뷰 작성</div>
</div>
<div id="tab-reviews" class="tab-content active">
  <div class="section">
    <p class="section-title">최신 리뷰</p>
    <div id="reviews-list">
      <div style="text-align:center;padding:32px;color:var(--text-muted);font-size:13px;">불러오는 중...</div>
    </div>
  </div>
</div>
<div id="tab-drinks" class="tab-content">
  <div class="section">
    <p class="section-title">주류 탐색</p>
    <div class="drink-grid" id="drinks-grid">
      <div style="grid-column:1/-1;text-align:center;padding:32px;color:var(--text-muted);font-size:13px;">불러오는 중...</div>
    </div>
  </div>
</div>
<div id="tab-write" class="tab-content">
  <div class="section">
    <p class="section-title">리뷰 작성</p>
    <div id="write-form-wrap">
      <div class="write-form">
        <!-- 1. 술 검색 -->
        <div>
          <div class="write-label">술 선택 *</div>
          <input class="drink-search" id="drink-search-input" placeholder="술 이름을 검색하세요..." oninput="searchDrinks(this.value)" autocomplete="off" />
          <div class="search-results" id="search-results"></div>
          <div class="selected-drink" id="selected-drink">
            <span class="selected-drink-name" id="selected-drink-name"></span>
            <button class="selected-drink-clear" onclick="clearDrinkSelect()">✕ 다시 선택</button>
          </div>
        </div>
        <!-- 2. 별점 -->
        <div>
          <div class="write-label">별점 *</div>
          <div class="star-row" id="write-stars">
            <button class="star-btn-lg" onclick="setWriteStar(1)">★</button>
            <button class="star-btn-lg" onclick="setWriteStar(2)">★</button>
            <button class="star-btn-lg" onclick="setWriteStar(3)">★</button>
            <button class="star-btn-lg" onclick="setWriteStar(4)">★</button>
            <button class="star-btn-lg" onclick="setWriteStar(5)">★</button>
          </div>
        </div>
        <!-- 3. 향미 태그 -->
        <div>
          <div class="write-label">향미 태그 (복수 선택)</div>
          <div class="taste-tags" id="write-tags">
            <span class="taste-tag" onclick="toggleWriteTag(this)">달콤함</span>
            <span class="taste-tag" onclick="toggleWriteTag(this)">쓴맛</span>
            <span class="taste-tag" onclick="toggleWriteTag(this)">산미</span>
            <span class="taste-tag" onclick="toggleWriteTag(this)">과일향</span>
            <span class="taste-tag" onclick="toggleWriteTag(this)">꽃향기</span>
            <span class="taste-tag" onclick="toggleWriteTag(this)">오크향</span>
            <span class="taste-tag" onclick="toggleWriteTag(this)">스모키</span>
            <span class="taste-tag" onclick="toggleWriteTag(this)">바닐라</span>
            <span class="taste-tag" onclick="toggleWriteTag(this)">허브</span>
            <span class="taste-tag" onclick="toggleWriteTag(this)">견과류</span>
            <span class="taste-tag" onclick="toggleWriteTag(this)">초콜릿</span>
            <span class="taste-tag" onclick="toggleWriteTag(this)">커피</span>
            <span class="taste-tag" onclick="toggleWriteTag(this)">스파이시</span>
            <span class="taste-tag" onclick="toggleWriteTag(this)">미네랄</span>
            <span class="taste-tag" onclick="toggleWriteTag(this)">부드러움</span>
            <span class="taste-tag" onclick="toggleWriteTag(this)">깔끔함</span>
          </div>
        </div>
        <!-- 4. 한줄 리뷰 -->
        <div>
          <div class="write-label">한줄 리뷰</div>
          <textarea class="review-input" id="write-content" placeholder="이 술에 대한 솔직한 한줄 평을 남겨주세요..."></textarea>
        </div>
        <div class="form-msg" id="write-msg"></div>
        <button class="write-btn" onclick="submitWriteReview()">리뷰 등록하기 +50 XP</button>
      </div>
    </div>
  </div>
</div>
<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/core/supabase.js"></script>
<script>
  function switchTab(name, el) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    el.classList.add('active');
    sessionStorage.setItem('bar_tab', name);
  }
  function goBack() {
    location.href = 'index.html';
  }
  // 복귀 시 탭 복원
  document.addEventListener('DOMContentLoaded', () => {
    const savedTab = sessionStorage.getItem('bar_tab');
    if (savedTab && savedTab !== 'reviews') {
      const tabMap = { drinks: 2, write: 3 };
      const tabEl = document.querySelector(`.tab:nth-child(${tabMap[savedTab]})`);
      if (tabEl) switchTab(savedTab, tabEl);
    }
  });

  // 카테고리별 이모지
  const categoryEmoji = {
    '위스키':'🥃','전통주':'🍶','와인':'🍷','맥주':'🍺','칵테일':'🍸','기타':'🥂'
  };

  // 날짜 포맷
  function timeAgo(dateStr) {
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
    if (diff < 60) return '방금 전';
    if (diff < 3600) return Math.floor(diff/60) + '분 전';
    if (diff < 86400) return Math.floor(diff/3600) + '시간 전';
    return Math.floor(diff/86400) + '일 전';
  }

  // 주류 탐색 로드
  async function loadDrinks() {
    const { data, error } = await soolClient
      .from('drinks')
      .select('*')
      .order('created_at', { ascending: false });

    const grid = document.getElementById('drinks-grid');
    if (error || !data || data.length === 0) {
      grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:32px;color:var(--text-muted);font-size:13px;">등록된 술이 없어요 🍶</div>`;
      return;
    }
    grid.innerHTML = data.map(d => `
      <div class="drink-card" onclick="location.href='drink-detail.html?id=${d.id}&from=bar.html'">
        <div class="drink-icon">${categoryEmoji[d.category] || '🍾'}</div>
        <div class="drink-name-row">
          <span class="drink-name">${d.name}</span>
          ${d.alcohol_degree ? `<span class="drink-abv">${d.alcohol_degree}%</span>` : ''}
        </div>
        <div class="drink-category">${d.category}${d.subcategory ? ' · ' + d.subcategory : ''}</div>
        <div class="drink-desc">${d.description || ''}</div>
        <div class="drink-rating">${d.avg_rating ? '★ ' + d.avg_rating + ' · ' : ''}리뷰 ${d.review_count}개</div>
      </div>
    `).join('');
  }

  // 최신 리뷰 로드
  async function loadReviews() {
    const { data, error } = await soolClient
      .from('reviews')
      .select('*, users(nickname), drinks(name, category)')
      .order('created_at', { ascending: false })
      .limit(20);

    const list = document.getElementById('reviews-list');
    if (error || !data || data.length === 0) {
      list.innerHTML = `<div style="text-align:center;padding:32px;color:var(--text-muted);font-size:13px;">아직 리뷰가 없어요. 첫 리뷰를 작성해보세요! ✍️</div>`;
      return;
    }
    list.innerHTML = data.map(r => `
      <div class="review-card" onclick="location.href='drink-detail.html?id=${r.drink_id}&from=bar.html'">
        <div class="review-header">
          <div class="review-emoji">${categoryEmoji[r.drinks?.category] || '🍾'}</div>
          <div class="review-name">${r.drinks?.name || '—'}</div>
          <div class="review-rating">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
        </div>
        <div class="review-body">${r.content || ''}</div>
        <div class="review-meta">
          <span class="tag">${r.drinks?.category || '—'}</span>
          <span class="tag">@${r.users?.nickname || '익명'}</span>
          <span class="review-date">${timeAgo(r.created_at)}</span>
        </div>
      </div>
    `).join('');
  }

  // 리뷰 작성 탭 변수
  let writeStar = 0;
  let writeTags = [];
  let selectedDrinkId = null;
  let searchTimer = null;

  // 술 검색
  async function searchDrinks(query) {
    clearTimeout(searchTimer);
    const results = document.getElementById('search-results');
    if (!query || query.length < 1) { results.style.display = 'none'; return; }
    searchTimer = setTimeout(async () => {
      const { data } = await soolClient.from('drinks').select('id, name, category, subcategory, alcohol_degree')
        .ilike('name', `%${query}%`).limit(8);
      if (!data || data.length === 0) { results.style.display = 'none'; return; }
      results.style.display = 'block';
      results.innerHTML = data.map(d => `
        <div class="search-item" onclick="selectDrink('${d.id}', '${d.name.replace(/'/g, "\'")}', '${d.category}', '${d.alcohol_degree || ''}')">
          <div class="search-item-name">${d.name}</div>
          <div class="search-item-sub">${d.category}${d.subcategory ? ' · ' + d.subcategory : ''}${d.alcohol_degree ? ' · ' + d.alcohol_degree + '%' : ''}</div>
        </div>
      `).join('');
    }, 300);
  }

  function selectDrink(id, name, category, abv) {
    selectedDrinkId = id;
    document.getElementById('drink-search-input').style.display = 'none';
    document.getElementById('search-results').style.display = 'none';
    const sel = document.getElementById('selected-drink');
    sel.style.display = 'flex';
    document.getElementById('selected-drink-name').textContent = `${name} (${category}${abv ? ' · ' + abv + '%' : ''})`;
  }

  function clearDrinkSelect() {
    selectedDrinkId = null;
    document.getElementById('drink-search-input').style.display = 'block';
    document.getElementById('drink-search-input').value = '';
    document.getElementById('selected-drink').style.display = 'none';
  }

  function setWriteStar(n) {
    writeStar = n;
    document.querySelectorAll('#write-stars .star-btn-lg').forEach((btn, i) => btn.classList.toggle('active', i < n));
  }

  function toggleWriteTag(el) {
    el.classList.toggle('selected');
    const tag = el.textContent;
    if (el.classList.contains('selected')) writeTags.push(tag);
    else writeTags = writeTags.filter(t => t !== tag);
  }

  async function submitWriteReview() {
    const { data: { session } } = await soolClient.auth.getSession();
    if (!session) { location.href = 'auth.html'; return; }
    if (!selectedDrinkId) { showWriteMsg('error', '술을 선택해주세요!'); return; }
    if (!writeStar) { showWriteMsg('error', '별점을 선택해주세요!'); return; }

    const content = document.getElementById('write-content').value.trim();
    const { error } = await soolClient.from('reviews').insert({
      user_id: session.user.id,
      drink_id: selectedDrinkId,
      rating: writeStar,
      content: content || null,
      taste_tags: writeTags.length > 0 ? writeTags : null,
    });

    if (error) {
      showWriteMsg('error', '등록 중 오류가 발생했어요.');
    } else {
      // 평균 평점 업데이트
      const { data: reviews } = await soolClient.from('reviews').select('rating').eq('drink_id', selectedDrinkId);
      if (reviews && reviews.length > 0) {
        const avg = reviews.reduce((s, r) => s + r.rating, 0) / reviews.length;
        await soolClient.from('drinks').update({ avg_rating: Math.round(avg * 100) / 100, review_count: reviews.length }).eq('id', selectedDrinkId);
      }
      showWriteMsg('success', '리뷰가 등록됐어요! +50 XP 🎉');
      // 폼 초기화
      setTimeout(() => {
        writeStar = 0; writeTags = []; selectedDrinkId = null;
        clearDrinkSelect();
        document.querySelectorAll('#write-stars .star-btn-lg').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('#write-tags .taste-tag').forEach(t => t.classList.remove('selected'));
        document.getElementById('write-content').value = '';
        loadReviews();
      }, 1500);
    }
  }

  function showWriteMsg(type, text) {
    const el = document.getElementById('write-msg');
    el.className = 'form-msg ' + type;
    el.textContent = text;
    setTimeout(() => { el.className = 'form-msg'; }, 3000);
  }

  // 로그인 체크 후 폼 표시
  async function initWriteTab() {
    const { data: { session } } = await soolClient.auth.getSession();
    if (!session) {
      document.getElementById('write-form-wrap').innerHTML = `
        <div style="text-align:center;padding:32px;color:var(--text-muted);font-size:13px;">
          <a href="auth.html" style="color:var(--red-400);text-decoration:none;">로그인</a> 후 리뷰를 작성할 수 있어요
        </div>`;
    }
  }

  // 초기 로드
  loadDrinks();
  loadReviews();
  initWriteTab();
</script>
<script src="js/ui/chat.js"></script>
