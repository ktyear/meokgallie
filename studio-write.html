<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영상 공유 — 술향기마을</title>
<style>
  :root{--pink-50:#FFF0F8;--pink-100:#FFB8DC;--pink-200:#FF1493;--pink-400:#CC0070;--bg:#FDF0F8;--bg-card:#fff;--text-primary:#200010;--text-secondary:#680040;--text-muted:#A06080;--border:rgba(0,0,0,0.07);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;}
  nav{background:var(--bg-card);border-bottom:0.5px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .nav-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);cursor:pointer;}.nav-back:hover{color:var(--pink-400);}.nav-back svg{width:16px;height:16px;}
  .nav-logo{font-size:15px;font-weight:600;display:flex;align-items:center;gap:7px;}
  .nav-logo-dot{width:8px;height:8px;border-radius:50%;background:var(--pink-200);}
  .content{max-width:640px;margin:0 auto;padding:24px;}
  .section{background:var(--bg-card);border:0.5px solid var(--border);border-radius:12px;padding:20px;}
  .form-label{font-size:11px;color:var(--text-muted);letter-spacing:0.06em;margin-bottom:6px;display:block;}
  .form-input,.form-select,.form-textarea{width:100%;background:var(--bg);border:0.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text-primary);font-family:inherit;outline:none;transition:border-color 0.15s;margin-bottom:14px;}
  .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--pink-200);}
  .form-textarea{resize:none;height:100px;}
  .form-input::placeholder,.form-textarea::placeholder{color:var(--text-muted);}
  .form-select option{background:#fff;}
  .preview{width:100%;aspect-ratio:16/9;background:#1a0010;border-radius:8px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.4);font-size:13px;margin-bottom:14px;overflow:hidden;}
  .preview iframe{width:100%;height:100%;border:none;}
  .submit-btn{width:100%;background:var(--pink-200);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background 0.15s;}
  .submit-btn:hover{background:var(--pink-400);}
  .form-msg{font-size:12px;text-align:center;padding:8px;border-radius:8px;display:none;margin-bottom:10px;}
  .form-msg.success{display:block;background:rgba(74,222,128,0.1);color:#16a34a;}
  .form-msg.error{display:block;background:rgba(239,68,68,0.1);color:#dc2626;}
  .page-title{font-size:18px;font-weight:700;margin-bottom:16px;}
</style>
</head>
<body>

<nav>
  <a class="nav-back" onclick="goBack()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
    뒤로가기
  </a>
  <div class="nav-logo"><div class="nav-logo-dot"></div>술향기마을</div>
  <div style="width:80px;"></div>
</nav>

<div class="content">
  <div class="section">
    <div class="page-title">🎬 영상 공유</div>

    <label class="form-label">카테고리 *</label>
    <select class="form-select" id="post-type">
      <option value="trending">🔥 트렌딩</option>
      <option value="recipe">🍸 레시피</option>
      <option value="upload">📹 유저 영상</option>
    </select>

    <label class="form-label">제목 *</label>
    <input class="form-input" id="post-title" placeholder="영상 제목을 입력하세요" maxlength="100" />

    <label class="form-label">유튜브 URL *</label>
    <input class="form-input" id="post-video" placeholder="https://www.youtube.com/watch?v=..." oninput="updatePreview(this.value)" />

    <div class="preview" id="video-preview">
      <span>유튜브 URL을 입력하면 미리보기가 나타나요</span>
    </div>

    <label class="form-label">설명 (선택)</label>
    <textarea class="form-textarea" id="post-content" placeholder="영상에 대한 간단한 설명을 입력하세요..."></textarea>

    <div class="form-msg" id="form-msg"></div>
    <button class="submit-btn" onclick="submitPost()">공유하기</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/core/supabase.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const defaultType = params.get('type') || 'trending';

  // 카테고리 초기값 설정
  document.getElementById('post-type').value = defaultType;

  function goBack() {
    const from = params.get('from');
    location.href = from || 'studio.html';
  }

  function getYoutubeId(url) {
    try {
      const u = new URL(url);
      if (u.hostname.includes('youtube.com')) return u.searchParams.get('v');
      if (u.hostname === 'youtu.be') return u.pathname.slice(1);
    } catch(e) {}
    return null;
  }

  function updatePreview(url) {
    const preview = document.getElementById('video-preview');
    const ytId = getYoutubeId(url);
    if (ytId) {
      preview.innerHTML = `<iframe src="https://www.youtube.com/embed/${ytId}" allowfullscreen></iframe>`;
    } else {
      preview.innerHTML = '<span>유튜브 URL을 입력하면 미리보기가 나타나요</span>';
    }
  }

  async function submitPost() {
    const { data: { session } } = await soolClient.auth.getSession();
    if (!session) { location.href = 'auth.html'; return; }

    const type = document.getElementById('post-type').value;
    const title = document.getElementById('post-title').value.trim();
    const videoUrl = document.getElementById('post-video').value.trim();
    const content = document.getElementById('post-content').value.trim();

    if (!title) { showMsg('error', '제목을 입력해주세요!'); return; }
    if (!videoUrl) { showMsg('error', '유튜브 URL을 입력해주세요!'); return; }
    if (!getYoutubeId(videoUrl)) { showMsg('error', '올바른 유튜브 URL을 입력해주세요!'); return; }

    const { error } = await soolClient.from('studio_posts').insert({
      user_id: session.user.id,
      type, title,
      content: content || null,
      video_url: videoUrl,
    });

    if (error) {
      showMsg('error', '등록 중 오류가 발생했어요.');
      console.error(error);
    } else {
      showMsg('success', '영상이 공유됐어요! 🎬');
      setTimeout(() => goBack(), 1200);
    }
  }

  function showMsg(type, text) {
    const el = document.getElementById('form-msg');
    el.className = 'form-msg ' + type;
    el.textContent = text;
  }
</script>
</body>
</html>
