<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>커뮤니티 — 술향기마을</title>
<style>
  :root{--purple-50:#F3EEFF;--purple-100:#D4B8FF;--purple-200:#9966FF;--purple-400:#7744DD;--purple-600:#5522AA;--bg:#F2EEFB;--bg-card:#fff;--text-primary:#100820;--text-secondary:#4a3868;--text-muted:#8878aa;--border:rgba(0,0,0,0.07);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;}
  nav{background:var(--bg-card);border-bottom:0.5px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .nav-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);cursor:pointer;}.nav-back:hover{color:var(--purple-400);}.nav-back svg{width:16px;height:16px;}
  .nav-logo{font-size:15px;font-weight:600;display:flex;align-items:center;gap:7px;}
  .nav-logo-dot{width:8px;height:8px;border-radius:50%;background:var(--purple-200);}
  .nav-spacer{width:80px;}
  .hero{background:linear-gradient(135deg,#1E0A44 0%,#4A2A88 100%);padding:24px 24px 20px;}
  .hero-inner{max-width:640px;margin:0 auto;display:flex;align-items:center;gap:16px;}
  .hero-icon{font-size:40px;}
  .hero-name{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px;}
  .hero-desc{font-size:13px;color:rgba(255,255,255,0.7);}
  .section{padding:16px 24px;max-width:640px;margin:0 auto;}
  .write-fab{position:fixed;bottom:24px;right:24px;background:var(--purple-200);color:#fff;border:none;border-radius:99px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 4px 20px rgba(153,102,255,0.4);transition:background 0.15s;z-index:10;}
  .write-fab:hover{background:var(--purple-400);}
  .post-card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color 0.15s;}.post-card:hover{border-color:var(--purple-200);}
  .post-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .post-author{font-size:12px;font-weight:500;color:var(--text-secondary);}
  .post-time{font-size:11px;color:var(--text-muted);margin-left:auto;}
  .post-title{font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:4px;}
  .post-body{font-size:13px;color:var(--text-secondary);line-height:1.5;}
  .post-image{width:100%;border-radius:8px;margin-top:8px;max-height:200px;object-fit:cover;}
  .post-embed{width:100%;aspect-ratio:16/9;border:none;border-radius:8px;margin-top:8px;}
  .post-footer{display:flex;gap:12px;margin-top:10px;}
  .post-stat{font-size:12px;color:var(--text-muted);}
  .empty{text-align:center;padding:40px;color:var(--text-muted);font-size:13px;}

  /* 글쓰기 모달 */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:none;align-items:flex-end;}
  .modal-bg.show{display:flex;}
  .modal{background:var(--bg-card);border-radius:20px 20px 0 0;padding:24px;width:100%;max-height:85vh;overflow-y:auto;}
  .modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
  .modal-close{font-size:18px;cursor:pointer;color:var(--text-muted);background:none;border:none;}
  .write-form{display:flex;flex-direction:column;gap:12px;}
  .write-label{font-size:11px;color:var(--text-muted);letter-spacing:0.06em;margin-bottom:4px;}
  .write-input,.write-textarea{width:100%;background:var(--bg);border:0.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text-primary);font-family:inherit;outline:none;transition:border-color 0.15s;}
  .write-input:focus,.write-textarea:focus{border-color:var(--purple-200);}
  .write-textarea{resize:none;height:120px;}
  .write-input::placeholder,.write-textarea::placeholder{color:var(--text-muted);}
  .write-btn{width:100%;background:var(--purple-200);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background 0.15s;}
  .write-btn:hover{background:var(--purple-400);}
  .form-msg{font-size:12px;text-align:center;padding:6px;border-radius:8px;display:none;}
  .form-msg.success{display:block;background:rgba(74,222,128,0.1);color:#16a34a;}
  .form-msg.error{display:block;background:rgba(239,68,68,0.1);color:#dc2626;}
  #page-loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;}
  #page-loading.hide{display:none;}
  @media(max-width:480px){nav{padding:12px 16px;}.section{padding:12px 16px;}}
</style>
</head>
<body>

<div id="page-loading">
  <div style="font-size:13px;color:var(--text-muted);">불러오는 중...</div>
</div>

<nav>
  <a class="nav-back" onclick="location.href='community.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
    커뮤니티
  </a>
  <div class="nav-logo"><div class="nav-logo-dot"></div>술향기마을</div>
  <div class="nav-spacer"></div>
</nav>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-icon" id="c-icon">💬</div>
    <div>
      <div class="hero-name" id="c-name">—</div>
      <div class="hero-desc" id="c-desc"></div>
    </div>
  </div>
</div>

<div class="section">
  <div id="posts-list"><div class="empty">불러오는 중...</div></div>
</div>

<!-- 글쓰기 버튼 -->
<button class="write-fab" id="write-fab" onclick="openModal()">✏️ 글쓰기</button>

<!-- 글쓰기 모달 -->
<div class="modal-bg" id="modal-bg" onclick="closeModalBg(event)">
  <div class="modal">
    <div class="modal-title">
      <span>글쓰기</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-content">
      <div class="write-form">
        <div>
          <div class="write-label">제목 *</div>
          <input class="write-input" id="post-title" placeholder="제목을 입력하세요" maxlength="100" />
        </div>
        <div>
          <div class="write-label">내용 *</div>
          <textarea class="write-textarea" id="post-content" placeholder="내용을 입력하세요..."></textarea>
        </div>
        <div>
          <div class="write-label">이미지 URL (선택)</div>
          <input class="write-input" id="post-image" placeholder="https://... 이미지 주소" />
        </div>
        <div>
          <div class="write-label">유튜브 / 외부 링크 (선택)</div>
          <input class="write-input" id="post-embed" placeholder="https://youtube.com/..." />
        </div>
        <div class="form-msg" id="post-msg"></div>
        <button class="write-btn" onclick="submitPost()">등록하기 +30 XP</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/core/supabase.js"></script>
<script src="community-shared.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const communityId = params.get('id');
  let currentUser = null;
  let communityData = null;
  let isSubmittingPost = false;

  function timeAgo(dateStr) {
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
    if (diff < 60) return '방금 전';
    if (diff < 3600) return Math.floor(diff/60) + '분 전';
    if (diff < 86400) return Math.floor(diff/3600) + '시간 전';
    return Math.floor(diff/86400) + '일 전';
  }

  async function init() {
    if (!communityId) { location.href = 'community.html'; return; }

    try {
      // 커뮤니티 정보 (없거나 오류면 목록으로 돌려보냄)
      const { data: comm, error: commError } = await soolClient
        .from('communities').select('*').eq('id', communityId).maybeSingle();
      if (commError || !comm) { location.href = 'community.html'; return; }

      communityData = comm;
      document.title = comm.name + ' — 술향기마을';
      document.getElementById('c-icon').textContent = comm.icon;
      document.getElementById('c-name').textContent = comm.name;
      document.getElementById('c-desc').textContent = comm.description || '';

      // 로그인 확인
      const { data: { session } } = await soolClient.auth.getSession();
      if (session) {
        const { data: user } = await soolClient.from('users').select('id, nickname').eq('id', session.user.id).single();
        currentUser = user;
      } else {
        document.getElementById('write-fab').style.display = 'none';
      }

      await loadPosts();
    } catch (error) {
      console.error('초기화 실패:', error);
    } finally {
      document.getElementById('page-loading').classList.add('hide');
    }
  }

  async function loadPosts() {
    const { data, error } = await soolClient
      .from('posts')
      .select('*, users(nickname)')
      .eq('community_id', communityId)
      .order('created_at', { ascending: false })
      .limit(30);

    const list = document.getElementById('posts-list');
    if (error) {
      console.error('게시글 로드 실패:', error);
      list.innerHTML = '<div class="empty">게시글을 불러오지 못했어요.</div>';
      return;
    }
    if (!data || data.length === 0) {
      list.innerHTML = '<div class="empty">아직 게시글이 없어요.<br>첫 글을 작성해보세요! ✍️</div>';
      return;
    }

    // 복귀 URL은 커뮤니티 id만 있으면 충분 (이름/아이콘은 DB에서 다시 조회)
    const returnUrl = `community-posts.html?id=${encodeURIComponent(communityId)}`;

    list.innerHTML = data.map(p => {
      const ytId = p.embed_url ? getYoutubeId(p.embed_url) : null;
      const hasPlainLink = p.embed_url && !ytId && isAllowedUrl(p.embed_url);
      const detailUrl = `post-detail.html?id=${encodeURIComponent(p.id)}&from=${encodeURIComponent(returnUrl)}`;
      return `
        <div class="post-card" onclick="location.href='${detailUrl}'">
          <div class="post-header">
            <div class="post-author">@${esc(p.users?.nickname || '익명')}</div>
            <div class="post-time">${timeAgo(p.created_at)}</div>
          </div>
          <div class="post-title">${esc(p.title)}</div>
          <div class="post-body">${esc(safeSlice(p.content, 100))}</div>
          ${p.image_url ? `<img class="post-image" src="${escAttr(p.image_url)}" onerror="this.style.display='none'" />` : ''}
          ${ytId ? `<iframe class="post-embed" src="https://www.youtube.com/embed/${escAttr(ytId)}" allowfullscreen></iframe>` : ''}
          ${hasPlainLink ? `<a href="${escAttr(p.embed_url)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" style="font-size:12px;color:var(--purple-400);margin-top:6px;display:inline-block;">🔗 외부 링크 열기</a>` : ''}
          <div class="post-footer">
            <span class="post-stat">👍 ${p.like_count}</span>
            <span class="post-stat">💬 ${p.comment_count}</span>
            <span class="post-stat">👁️ ${p.view_count}</span>
          </div>
        </div>`;
    }).join('');
  }

  function openModal() {
    if (!currentUser) { location.href = 'auth.html'; return; }
    document.getElementById('modal-bg').classList.add('show');
    document.body.style.overflow = 'hidden';
    setTimeout(() => document.getElementById('post-title')?.focus(), 50);
  }

  function closeModal() {
    document.getElementById('modal-bg').classList.remove('show');
    document.body.style.overflow = '';
  }

  function closeModalBg(e) {
    if (e.target === document.getElementById('modal-bg')) closeModal();
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && document.getElementById('modal-bg').classList.contains('show')) closeModal();
  });

  async function submitPost() {
    if (isSubmittingPost) return;
    const title = document.getElementById('post-title').value.trim();
    const content = document.getElementById('post-content').value.trim();
    const imageUrl = document.getElementById('post-image').value.trim();
    const embedUrl = document.getElementById('post-embed').value.trim();

    if (!title) { showMsg('제목을 입력해주세요!', 'error'); return; }
    if (!content) { showMsg('내용을 입력해주세요!', 'error'); return; }
    if (!isAllowedUrl(imageUrl)) { showMsg('올바른 이미지 URL을 입력해주세요.', 'error'); return; }
    if (!isAllowedUrl(embedUrl)) { showMsg('올바른 외부 링크를 입력해주세요.', 'error'); return; }

    isSubmittingPost = true;
    const btn = document.querySelector('.write-btn');
    if (btn) btn.disabled = true;

    try {
      const { error } = await soolClient.from('posts').insert({
        user_id: currentUser.id,
        community_id: communityId,
        category: communityData?.name || '',
        title, content,
        image_url: imageUrl || null,
        embed_url: embedUrl || null,
      });

      if (error) { showMsg('등록 중 오류가 발생했어요.', 'error'); }
      else {
        showMsg('등록됐어요! +30 XP 🎉', 'success');
        ['post-title','post-content','post-image','post-embed'].forEach(id => {
          document.getElementById(id).value = '';
        });
        setTimeout(() => { closeModal(); loadPosts(); }, 1200);
      }
    } finally {
      isSubmittingPost = false;
      if (btn) btn.disabled = false;
    }
  }

  function showMsg(text, type) {
    const el = document.getElementById('post-msg');
    el.className = 'form-msg ' + type;
    el.textContent = text;
    setTimeout(() => { el.className = 'form-msg'; }, 3000);
  }

  init();
</script>
</body>
</html>
