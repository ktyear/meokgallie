<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영상관 — 술향기마을</title>
<style>
  :root{--pink-50:#FFF0F8;--pink-100:#FFB8DD;--pink-200:#FF44AA;--pink-400:#DD2288;--pink-600:#AA1166;--pink-900:#3A0422;--bg:#FBF0F8;--bg-card:#fff;--text-primary:#1a0410;--text-secondary:#6b2848;--text-muted:#a07888;--border:rgba(0,0,0,0.07);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;}
  nav{background:var(--bg-card);border-bottom:0.5px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .nav-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);text-decoration:none;cursor:pointer;}.nav-back:hover{color:var(--pink-400);}.nav-back svg{width:16px;height:16px;}
  .nav-logo{font-size:15px;font-weight:600;display:flex;align-items:center;gap:7px;}
  .nav-logo-dot{width:8px;height:8px;border-radius:50%;background:var(--pink-200);}
  .nav-spacer{width:80px;}
  .hero{background:linear-gradient(135deg,#3A0422 0%,#8A1A55 100%);padding:32px 24px 28px;}
  .hero-inner{max-width:640px;margin:0 auto;}
  .hero-tag{display:inline-block;font-size:11px;font-weight:600;color:#FFB8DD;background:rgba(255,255,255,0.1);padding:3px 10px;border-radius:99px;margin-bottom:10px;}
  .hero-title{font-size:24px;font-weight:700;color:#fff;margin-bottom:6px;}
  .hero-sub{font-size:14px;color:rgba(255,255,255,0.7);line-height:1.65;}
  .section{padding:20px 24px;max-width:640px;margin:0 auto;}
  .section-title{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:14px;}
  .tabs{background:var(--bg-card);border-bottom:0.5px solid var(--border);display:flex;overflow-x:auto;justify-content:center;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{padding:12px 18px;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all 0.15s;}.tab.active{color:var(--pink-400);border-bottom-color:var(--pink-200);}
  .tab-content{display:none;}.tab-content.active{display:block;}
  .video-card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;cursor:pointer;transition:border-color 0.15s;}.video-card:hover{border-color:var(--pink-200);}
  .video-thumb{height:140px;display:flex;align-items:center;justify-content:center;font-size:48px;position:relative;}
  .video-play{position:absolute;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;font-size:18px;}
  .video-body{padding:12px 14px;}
  .video-title{font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:4px;}
  .video-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-muted);}
  .video-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;}
  .upload-btn{width:100%;background:var(--pink-200);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;transition:background 0.15s;}.upload-btn:hover{background:var(--pink-400);}
  .video-card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color 0.15s;}
  .video-card:hover{border-color:var(--pink-200);}
  .video-title{font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:4px;}
  .video-meta{font-size:11px;color:var(--text-muted);margin-bottom:4px;}
  .video-desc{font-size:12px;color:var(--text-secondary);}
  .video-tag{font-size:11px;color:var(--text-muted);background:var(--bg);border:0.5px solid var(--border);padding:2px 8px;border-radius:99px;margin-right:4px;}
  @media(max-width:480px){nav{padding:12px 16px;}.hero{padding:20px 16px 20px;}.section{padding:16px;}.video-grid{grid-template-columns:1fr;}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/core/supabase.js"></script>
</head>
<body>
<nav>
  <a class="nav-back" onclick="goBack()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>마을로 돌아가기</a>
  <div class="nav-logo"><div class="nav-logo-dot"></div>술향기마을</div>
  <div class="nav-spacer"></div>
</nav>
<div class="hero">
  <div class="hero-inner">
    <div class="hero-tag">영상관 · 숏폼 & 콘텐츠</div>
    <h1 class="hero-title">🎬 영상관</h1>
    <p class="hero-sub">하이볼 레시피, 칵테일 튜토리얼, 바텐더 인터뷰.<br>보고 바로 따라하는 술 콘텐츠.</p>
  </div>
</div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('trending',this)">트렌딩</div>
  <div class="tab" onclick="switchTab('recipe',this)">레시피</div>
  <div class="tab" onclick="switchTab('upload',this)">업로드</div>
</div>
<div id="tab-trending" class="tab-content active">
  <div class="section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <p class="section-title" style="margin-bottom:0;">트렌딩</p>
      <button id="write-trending-btn" onclick="goWrite('trending')" style="background:rgba(255,20,147,0.15);border:1px solid rgba(255,20,147,0.3);border-radius:6px;color:var(--pink-400);font-size:12px;padding:5px 12px;cursor:pointer;font-family:inherit;">✏️ 영상 공유</button>
    </div>
    <div id="trending-list"><div style="text-align:center;padding:32px;color:var(--text-muted);font-size:13px;">불러오는 중...</div></div>
  </div>
</div>
<div id="tab-recipe" class="tab-content">
  <div class="section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <p class="section-title" style="margin-bottom:0;">레시피 영상</p>
      <button id="write-recipe-btn" onclick="goWrite('recipe')" style="background:rgba(255,20,147,0.15);border:1px solid rgba(255,20,147,0.3);border-radius:6px;color:var(--pink-400);font-size:12px;padding:5px 12px;cursor:pointer;font-family:inherit;">✏️ 영상 공유</button>
    </div>
    <div id="recipe-list"><div style="text-align:center;padding:32px;color:var(--text-muted);font-size:13px;">불러오는 중...</div></div>
  </div>
</div>

<div id="tab-upload" class="tab-content">
  <div class="section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <p class="section-title" style="margin-bottom:0;">유저 영상</p>
      <button id="write-upload-btn" onclick="goWrite('upload')" style="background:rgba(255,20,147,0.15);border:1px solid rgba(255,20,147,0.3);border-radius:6px;color:var(--pink-400);font-size:12px;padding:5px 12px;cursor:pointer;font-family:inherit;">✏️ 영상 공유</button>
    </div>
    <div id="upload-list"><div style="text-align:center;padding:32px;color:var(--text-muted);font-size:13px;">불러오는 중...</div></div>
  </div>
</div>
<script>
  function switchTab(name, el) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    el.classList.add('active');
    sessionStorage.setItem('studio_tab', name);
  }
  function goBack() { location.href = 'index.html'; }
  // 복귀 시 탭 복원
  document.addEventListener('DOMContentLoaded', () => {
    const savedTab = sessionStorage.getItem('studio_tab');
    if (savedTab && savedTab !== 'trending') {
      const tabMap = {"trending": 1, "recipe": 2, "upload": 3};
      const tabEl = document.querySelector(`.tab:nth-child(${tabMap[savedTab]})`);
      if (tabEl) switchTab(savedTab, tabEl);
    }
  });

  // XSS 방지
  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  function safeSlice(str, len) {
    if (!str) return '';
    const chars = [...str];
    return chars.slice(0, len).join('') + (chars.length > len ? '...' : '');
  }

  function getYoutubeId(url) {
    try {
      const u = new URL(url);
      if (u.hostname.includes('youtube.com')) return u.searchParams.get('v');
      if (u.hostname === 'youtu.be') return u.pathname.slice(1);
    } catch(e) {}
    return null;
  }

  function timeAgo(dateStr) {
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
    if (diff < 60) return '방금 전';
    if (diff < 3600) return Math.floor(diff/60) + '분 전';
    if (diff < 86400) return Math.floor(diff/3600) + '시간 전';
    return Math.floor(diff/86400) + '일 전';
  }

  const typeMap = { trending: 'trending-list', recipe: 'recipe-list', upload: 'upload-list' };
  const emptyMsg = {
    trending: '아직 트렌딩 영상이 없어요 🎬',
    recipe: '아직 레시피 영상이 없어요 🍸',
    upload: '아직 공유된 영상이 없어요 📹'
  };

  async function loadAll() {
    const { data, error } = await soolClient
      .from('studio_posts')
      .select('*, users(nickname)')
      .order('created_at', { ascending: false })
      .limit(50);

    if (error) { console.error('studio_posts 로드 실패:', error); }

    ['trending', 'recipe', 'upload'].forEach(type => {
      const items = (data || []).filter(p => p.type === type);
      const listEl = document.getElementById(typeMap[type]);
      if (!listEl) return;

      if (!items || items.length === 0) {
        listEl.innerHTML = `<div style="text-align:center;padding:24px;color:var(--text-muted);font-size:13px;">${emptyMsg[type]}</div>`;
        return;
      }

      listEl.innerHTML = items.map(p => {
        const ytId = p.video_url ? getYoutubeId(p.video_url) : null;
        const thumb = ytId ? `<img src="https://img.youtube.com/vi/${ytId}/mqdefault.jpg" style="width:100%;border-radius:8px;margin-bottom:8px;aspect-ratio:16/9;object-fit:cover;" onerror="this.style.display='none'">` : '';
        return `
          <div class="video-card" onclick="location.href='studio-detail.html?id=${p.id}&from=studio.html'">
            ${thumb}
            <div class="video-title">${esc(p.title)}</div>
            <div class="video-meta">@${esc(p.users?.nickname || '술향기마을')} · ${timeAgo(p.created_at)}</div>
            <div class="video-desc">${esc(safeSlice(p.content, 60))}</div>
            <div style="margin-top:8px;">
              <span class="video-tag">👍 ${p.like_count || 0}</span>
              <span class="video-tag">💬 ${p.comment_count || 0}</span>
            </div>
          </div>`;
      }).join('');
    });
  }

  async function goWrite(type) {
    const { data: { session } } = await soolClient.auth.getSession();
    if (!session) { location.href = 'auth.html'; return; }
    location.href = `studio-write.html?type=${type}&from=studio.html`;
  }

  document.addEventListener('DOMContentLoaded', async () => {
    loadAll();
    const savedTab = sessionStorage.getItem('studio_tab');
    if (savedTab && savedTab !== 'trending') {
      const tabMap = { trending: 1, recipe: 2, upload: 3 };
      const tabEl = document.querySelector(`.tab:nth-child(${tabMap[savedTab]})`);
      if (tabEl) switchTab(savedTab, tabEl);
    }
  });
</script>
</body>
</html>
