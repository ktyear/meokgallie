<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>도서관 — 술향기마을</title>
<style>
  :root{--blue-50:#EEF4FF;--blue-100:#B8D0FF;--blue-200:#4488FF;--blue-400:#2266DD;--blue-600:#1144AA;--blue-900:#0A1E4A;--bg:#EEF2FB;--bg-card:#fff;--text-primary:#0a1020;--text-secondary:#3a4a6b;--text-muted:#7888aa;--border:rgba(0,0,0,0.07);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;}
  nav{background:var(--bg-card);border-bottom:0.5px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .nav-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);text-decoration:none;cursor:pointer;}.nav-back:hover{color:var(--blue-400);}.nav-back svg{width:16px;height:16px;}
  .nav-logo{font-size:15px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:7px;}
  .nav-logo-dot{width:8px;height:8px;border-radius:50%;background:var(--blue-200);}
  .nav-spacer{width:80px;}
  .hero{background:linear-gradient(135deg,#0A1E4A 0%,#1A3A8A 100%);padding:32px 24px 28px;}
  .hero-inner{max-width:640px;margin:0 auto;}
  .hero-tag{display:inline-block;font-size:11px;font-weight:600;color:#B8D0FF;background:rgba(255,255,255,0.1);padding:3px 10px;border-radius:99px;margin-bottom:10px;}
  .hero-title{font-size:24px;font-weight:700;color:#fff;margin-bottom:6px;}
  .hero-sub{font-size:14px;color:rgba(255,255,255,0.7);line-height:1.65;}
  .section{padding:20px 24px;max-width:640px;margin:0 auto;}
  .section-title{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:14px;}
  .tabs{background:var(--bg-card);border-bottom:0.5px solid var(--border);display:flex;overflow-x:auto;justify-content:center;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{padding:12px 18px;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all 0.15s;}.tab.active{color:var(--blue-400);border-bottom-color:var(--blue-200);}
  .tab-content{display:none;}.tab-content.active{display:block;}
  .course-card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color 0.15s;display:flex;gap:14px;align-items:flex-start;}.course-card:hover{border-color:var(--blue-200);}
  .course-icon{font-size:28px;flex-shrink:0;}
  .course-title{font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:4px;}
  .course-desc{font-size:12px;color:var(--text-secondary);line-height:1.5;margin-bottom:8px;}
  .course-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .badge{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;}
  .badge-free{background:var(--blue-50);color:var(--blue-600);}
  .badge-lv{background:#FFF3E0;color:#E65100;}
  .progress-bar{height:5px;background:var(--blue-50);border-radius:99px;overflow:hidden;margin-top:8px;}
  .progress-fill{height:100%;background:var(--blue-200);border-radius:99px;}
  .community-post-card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color 0.15s;}
  .community-post-card:hover{border-color:var(--blue-200);}
  .community-post-title{font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:4px;}
  .community-post-meta{font-size:11px;color:var(--text-muted);}
  .cert-card{background:linear-gradient(135deg,#0A1E4A 0%,#1A3A8A 100%);border-radius:12px;padding:20px;margin-bottom:10px;color:#fff;}
  .cert-title{font-size:15px;font-weight:700;margin-bottom:4px;}
  .cert-date{font-size:11px;color:rgba(255,255,255,0.7);}
  .cert-badge{font-size:32px;margin-bottom:8px;}
  .empty{text-align:center;padding:24px;color:var(--text-muted);font-size:13px;}
  @media(max-width:480px){nav{padding:12px 16px;}.hero{padding:20px 16px 20px;}.section{padding:16px;}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/core/supabase.js"></script>
</head>
<body>
<nav>
  <a class="nav-back" onclick="goBack()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>마을로 돌아가기</a>
  <div class="nav-logo"><div class="nav-logo-dot"></div>술향기마을</div>
  <div class="nav-spacer"></div>
</nav>
<div class="hero">
  <div class="hero-inner">
    <div class="hero-tag">도서관 · 교육 & 강의</div>
    <h1 class="hero-title">📚 도서관</h1>
    <p class="hero-sub">조주기능사부터 위스키 마스터까지.<br>잘 알고 마시는 것이 진짜 즐거움.</p>
  </div>
</div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('courses',this)">강의 목록</div>
  <div class="tab" onclick="switchTab('my',this)">내 강의실</div>
  <div class="tab" onclick="switchTab('cert',this)">수료증</div>
</div>
<div id="tab-courses" class="tab-content active">
  <div class="section">
    <p class="section-title">강의 목록</p>
    <div id="courses-list"><div style="text-align:center;padding:32px;color:var(--text-muted);font-size:13px;">불러오는 중...</div></div>
  </div>
  <div class="section">
    <p class="section-title">커뮤니티 자료</p>
    <div id="community-posts-list"><div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px;">불러오는 중...</div></div>
  </div>
</div>
<div id="tab-my" class="tab-content">
  <div class="section">
    <p class="section-title">수강 중인 강의</p>
    <div id="my-courses-list"><div style="text-align:center;padding:32px;color:var(--text-muted);font-size:13px;">불러오는 중...</div></div>
    <div style="text-align:center;padding:12px;color:var(--text-muted);font-size:12px;">강의 수료 시 <strong style="color:var(--blue-400);">+200 XP</strong> 획득!</div>
  </div>
</div>
<div id="tab-cert" class="tab-content">
  <div class="section">
    <p class="section-title">획득한 수료증</p>
    <div id="certs-list"><div style="text-align:center;padding:32px;color:var(--text-muted);font-size:13px;">불러오는 중...</div></div>
  </div>
</div>
<script>
  // XSS 방지
  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str == null ? '' : String(str);
    return d.innerHTML;
  }

  function switchTab(name, el) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    el.classList.add('active');
    sessionStorage.setItem('library_tab', name);
  }
  function goBack() { location.href = 'index.html'; }
  // 복귀 시 탭 복원
  document.addEventListener('DOMContentLoaded', () => {
    const savedTab = sessionStorage.getItem('library_tab');
    if (savedTab && savedTab !== 'courses') {
      const tabMap = {"courses": 1, "my": 2, "cert": 3};
      const tabEl = document.querySelector(`.tab:nth-child(${tabMap[savedTab]})`);
      if (tabEl) switchTab(savedTab, tabEl);
    }
    init();
  });

  const typeIcon = { text: '📝', video: '🎬', audio: '🎙️', live: '🔴' };
  const typeLabel = { text: '텍스트', video: '동영상', audio: '음성', live: '실시간' };

  function timeAgo(dateStr) {
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
    if (diff < 60) return '방금 전';
    if (diff < 3600) return Math.floor(diff/60) + '분 전';
    if (diff < 86400) return Math.floor(diff/3600) + '시간 전';
    return Math.floor(diff/86400) + '일 전';
  }

  async function init() {
    const { data: { session } } = await soolClient.auth.getSession();
    if (session) {
      await Promise.all([
        loadCourses(),
        loadCommunityPosts(),
        loadMyCourses(session.user.id),
        loadCerts(session.user.id),
      ]);
    } else {
      document.getElementById('my-courses-list').innerHTML = '<div class="empty"><a href="auth.html" style="color:var(--blue-400);text-decoration:none;">로그인</a> 후 수강 내역을 확인할 수 있어요</div>';
      document.getElementById('certs-list').innerHTML = '<div class="empty"><a href="auth.html" style="color:var(--blue-400);text-decoration:none;">로그인</a> 후 수료증을 확인할 수 있어요</div>';
      await Promise.all([loadCourses(), loadCommunityPosts()]);
    }
  }

  // 강의 목록
  async function loadCourses() {
    const { data, error } = await soolClient
      .from('courses')
      .select('*, users(nickname)')
      .eq('is_published', true)
      .order('created_at', { ascending: false });

    const list = document.getElementById('courses-list');
    if (error) {
      console.error('강의 목록 로드 실패:', error);
      list.innerHTML = '<div class="empty">강의 목록을 불러오지 못했어요.</div>';
      return;
    }
    if (!data || data.length === 0) {
      list.innerHTML = '<div class="empty">등록된 강의가 없어요. 곧 오픈될 예정이에요! 📚</div>';
      return;
    }
    list.innerHTML = data.map(c => `
      <div class="course-card" onclick="location.href='course-detail.html?id=${c.id}&from=library.html'">
        <div class="course-icon">${typeIcon[c.type] || '📚'}</div>
        <div style="flex:1;">
          <div class="course-title">${esc(c.title)}</div>
          <div class="course-desc">${esc(c.description || '')}</div>
          <div class="course-meta">
            <span class="badge ${c.is_free ? 'badge-free' : 'badge-lv'}">${c.is_free ? '무료' : '유료'}</span>
            ${c.required_level > 1 ? `<span class="badge badge-lv">Lv.${c.required_level} 이상</span>` : ''}
            <span style="font-size:11px;color:var(--text-muted);">${typeLabel[c.type] || ''}</span>
            ${c.duration_min ? `<span style="font-size:11px;color:var(--text-muted);">${c.duration_min}분</span>` : ''}
            <span style="font-size:11px;color:var(--text-muted);">강사: ${esc(c.users?.nickname) || '관리자'}</span>
          </div>
        </div>
      </div>
    `).join('');
  }

  // 커뮤니티 자료 (자격증 스터디 + 정보&뉴스)
  async function loadCommunityPosts() {
    const { data: communities } = await soolClient
      .from('communities')
      .select('id, name')
      .in('name', ['자격증 스터디', '정보 & 뉴스']);

    if (!communities || communities.length === 0) {
      document.getElementById('community-posts-list').innerHTML = '<div class="empty">커뮤니티 자료가 없어요.</div>';
      return;
    }

    const ids = communities.map(c => c.id);
    const { data, error } = await soolClient
      .from('posts')
      .select('*, users(nickname), communities(name, icon)')
      .in('community_id', ids)
      .order('created_at', { ascending: false })
      .limit(5);

    const list = document.getElementById('community-posts-list');
    if (error) {
      console.error('커뮤니티 자료 로드 실패:', error);
      list.innerHTML = '<div class="empty">자료를 불러오지 못했어요.</div>';
      return;
    }
    if (!data || data.length === 0) {
      list.innerHTML = '<div class="empty">아직 자료가 없어요.</div>';
      return;
    }
    list.innerHTML = data.map(p => `
      <div class="community-post-card" onclick="location.href='post-detail.html?id=${p.id}&from=library.html'">
        <div class="community-post-title">${esc(p.communities?.icon) || ''} ${esc(p.title)}</div>
        <div class="community-post-meta">@${esc(p.users?.nickname) || '익명'} · ${esc(p.communities?.name) || ''} · ${timeAgo(p.created_at)}</div>
      </div>
    `).join('');
  }

  // 내 수강 목록
  async function loadMyCourses(userId) {
    const { data, error } = await soolClient
      .from('course_enrollments')
      .select('*, courses(title, type, duration_min)')
      .eq('user_id', userId)
      .eq('completed', false)
      .order('created_at', { ascending: false });

    const list = document.getElementById('my-courses-list');
    if (error) {
      console.error('수강 목록 로드 실패:', error);
      list.innerHTML = '<div class="empty">수강 내역을 불러오지 못했어요.</div>';
      return;
    }
    if (!data || data.length === 0) {
      list.innerHTML = '<div class="empty">수강 중인 강의가 없어요.<br>강의 목록에서 수강 신청해보세요!</div>';
      return;
    }
    list.innerHTML = data.map(e => {
      const progress = Math.min(100, Math.max(0, e.progress || 0));
      return `
      <div class="course-card" onclick="location.href='course-detail.html?id=${e.course_id}&from=library.html'">
        <div class="course-icon">${typeIcon[e.courses?.type] || '📚'}</div>
        <div style="flex:1;">
          <div class="course-title">${esc(e.courses?.title) || '—'}</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">${progress}% 완료</div>
        </div>
      </div>
    `;
    }).join('');
  }

  // 수료증
  async function loadCerts(userId) {
    const { data, error } = await soolClient
      .from('course_enrollments')
      .select('*, courses(title, category)')
      .eq('user_id', userId)
      .eq('completed', true)
      .order('completed_at', { ascending: false });

    const list = document.getElementById('certs-list');
    if (error) {
      console.error('수료증 로드 실패:', error);
      list.innerHTML = '<div class="empty">수료증을 불러오지 못했어요.</div>';
      return;
    }
    if (!data || data.length === 0) {
      list.innerHTML = `<div style="background:var(--bg-card);border:0.5px solid var(--border);border-radius:12px;padding:24px;text-align:center;"><div style="font-size:40px;margin-bottom:12px;">🎓</div><div style="font-size:14px;color:var(--text-secondary);line-height:1.6;">강의를 수료하면 수료증이 발급돼요.<br>수료증은 프로필에 표시됩니다.</div></div>`;
      return;
    }
    list.innerHTML = data.map(e => `
      <div class="cert-card">
        <div class="cert-badge">🎓</div>
        <div class="cert-title">${esc(e.courses?.title) || '—'} 수료증</div>
        <div class="cert-date">수료일: ${e.completed_at ? new Date(e.completed_at).toLocaleDateString('ko-KR') : '—'}</div>
      </div>
    `).join('');
  }
</script>
<script src="js/ui/chat.js"></script>
<script>initSoolChat({ channelKey: 'building:library', label: '도서관 채팅', accentColor: '#4488FF' });</script>
</body>
</html>
