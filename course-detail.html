<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강의 — 술향기마을</title>
<style>
  :root{--blue-50:#EEF4FF;--blue-100:#B8D0FF;--blue-200:#4488FF;--blue-400:#2266DD;--blue-600:#1144AA;--bg:#EEF2FB;--bg-card:#fff;--text-primary:#080C20;--text-secondary:#283868;--text-muted:#6878aa;--border:rgba(0,0,0,0.07);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;}
  nav{background:var(--bg-card);border-bottom:0.5px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .nav-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);cursor:pointer;}.nav-back:hover{color:var(--blue-400);}.nav-back svg{width:16px;height:16px;}
  .nav-logo{font-size:15px;font-weight:600;display:flex;align-items:center;gap:7px;}
  .nav-logo-dot{width:8px;height:8px;border-radius:50%;background:var(--blue-200);}
  .nav-spacer{width:80px;}
  .hero{background:linear-gradient(135deg,#080C20 0%,#1A2860 100%);padding:28px 24px;}
  .hero-inner{max-width:640px;margin:0 auto;}
  .hero-type{font-size:11px;font-weight:600;color:#B8D0FF;background:rgba(255,255,255,0.1);padding:3px 10px;border-radius:99px;display:inline-block;margin-bottom:10px;}
  .hero-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:8px;line-height:1.4;}
  .hero-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .hero-meta span{font-size:12px;color:rgba(255,255,255,0.7);}
  .content{max-width:640px;margin:0 auto;padding:20px 24px 40px;}
  .section{margin-bottom:16px;background:var(--bg-card);border:0.5px solid var(--border);border-radius:12px;padding:16px 18px;}
  .section-title{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:12px;}
  .desc-text{font-size:13px;color:var(--text-secondary);line-height:1.7;}
  .content-text{font-size:14px;color:var(--text-primary);line-height:1.8;white-space:pre-wrap;}
  .video-wrap{width:100%;aspect-ratio:16/9;border-radius:8px;overflow:hidden;background:#000;}
  .video-wrap iframe{width:100%;height:100%;border:none;}
  .audio-wrap{width:100%;background:var(--bg);border-radius:8px;padding:16px;display:flex;align-items:center;gap:12px;}
  .live-wrap{background:linear-gradient(135deg,#1A0A2E,#3A1A5E);border-radius:12px;padding:20px;text-align:center;color:#fff;}
  .live-time{font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:12px;}
  .live-btn{background:#FF4444;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
  .enroll-btn{width:100%;background:var(--blue-200);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background 0.15s;}
  .enroll-btn:hover{background:var(--blue-400);}
  .enroll-btn:disabled{background:var(--border);color:var(--text-muted);cursor:not-allowed;}
  .complete-btn{width:100%;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;}
  .msg{font-size:12px;text-align:center;padding:6px;border-radius:8px;display:none;margin-top:8px;}
  .msg.success{display:block;background:rgba(74,222,128,0.1);color:#16a34a;}
  .msg.error{display:block;background:rgba(239,68,68,0.1);color:#dc2626;}
  #edit-btn{display:none;background:rgba(68,136,255,0.15);border:1px solid rgba(68,136,255,0.3);border-radius:6px;color:var(--blue-200);font-size:12px;padding:5px 12px;cursor:pointer;font-family:inherit;}
  .edit-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:none;align-items:flex-end;}
  .edit-modal-bg.show{display:flex;}
  .edit-modal{background:var(--bg-card);border-radius:20px 20px 0 0;padding:24px;width:100%;max-height:85vh;overflow-y:auto;}
  .edit-modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
  .edit-modal-close{font-size:18px;cursor:pointer;color:var(--text-muted);background:none;border:none;}
  .edit-form{display:flex;flex-direction:column;gap:12px;}
  .edit-label{font-size:11px;color:var(--text-muted);letter-spacing:0.06em;margin-bottom:4px;}
  .edit-input,.edit-select,.edit-textarea{width:100%;background:var(--bg);border:0.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text-primary);font-family:inherit;outline:none;transition:border-color 0.15s;}
  .edit-input:focus,.edit-select:focus,.edit-textarea:focus{border-color:var(--blue-200);}
  .edit-textarea{resize:none;height:100px;}
  .edit-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  .edit-full{grid-column:1/-1;}
  .edit-btn{width:100%;background:var(--blue-200);color:#fff;border:none;border-radius:10px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px;}
  .edit-btn:hover{background:var(--blue-400);}
  .edit-msg{font-size:12px;text-align:center;padding:6px;border-radius:8px;display:none;}
  .edit-msg.success{display:block;background:rgba(74,222,128,0.1);color:#16a34a;}
  .edit-msg.error{display:block;background:rgba(239,68,68,0.1);color:#dc2626;}
  #page-loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;}
  #page-loading.hide{display:none;}
  @media(max-width:480px){nav{padding:12px 16px;}.hero{padding:20px 16px;}.content{padding:16px 16px 32px;}}
</style>
</head>
<body>

<div id="page-loading">
  <div style="font-size:13px;color:var(--text-muted);">불러오는 중...</div>
</div>

<nav>
  <a class="nav-back" onclick="goBack()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
    뒤로가기
  </a>
  <div class="nav-logo"><div class="nav-logo-dot"></div>술향기마을</div>
  <button id="edit-btn" onclick="openEditModal()">✏️ 수정</button>
</nav>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-type" id="c-type">—</div>
    <div class="hero-title" id="c-title">—</div>
    <div class="hero-meta">
      <span id="c-instructor"></span>
      <span id="c-duration"></span>
      <span id="c-level"></span>
      <span id="c-free"></span>
    </div>
  </div>
</div>

<div class="content">

  <!-- 강의 설명 -->
  <div class="section" id="section-desc" style="display:none;">
    <div class="section-title">강의 소개</div>
    <div class="desc-text" id="c-desc"></div>
  </div>

  <!-- 강의 콘텐츠 -->
  <div class="section" id="section-content">
    <div class="section-title">강의 내용</div>
    <div id="c-content">불러오는 중...</div>
  </div>

  <!-- 수강 신청 -->
  <div class="section">
    <div id="enroll-wrap">
      <button class="enroll-btn" id="enroll-btn" onclick="enroll()">수강 신청하기</button>
      <div class="msg" id="enroll-msg"></div>
    </div>
  </div>

</div>

<!-- 수정 모달 -->
<div class="edit-modal-bg" id="edit-modal-bg" onclick="closeEditModalBg(event)">
  <div class="edit-modal">
    <div class="edit-modal-title">
      <span>강의 수정</span>
      <button class="edit-modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div class="edit-form">
      <div class="edit-grid">
        <div class="edit-full"><div class="edit-label">강의 제목 *</div><input class="edit-input" id="e-title" /></div>
        <div>
          <div class="edit-label">강의 유형 *</div>
          <select class="edit-select" id="e-type">
            <option value="text">📝 텍스트</option>
            <option value="video">🎬 동영상</option>
            <option value="audio">🎙️ 음성</option>
            <option value="live">🔴 실시간</option>
          </select>
        </div>
        <div>
          <div class="edit-label">카테고리</div>
          <select class="edit-select" id="e-category">
            <option value="위스키">🥃 위스키</option>
            <option value="전통주">🍶 전통주</option>
            <option value="와인">🍷 와인</option>
            <option value="맥주">🍺 맥주</option>
            <option value="칵테일">🍸 칵테일</option>
            <option value="기타">🥂 기타</option>
            <option value="자격증">🎓 자격증</option>
            <option value="소믈리에">🍷 소믈리에</option>
            <option value="공통">📚 공통</option>
          </select>
        </div>
        <div><div class="edit-label">소요 시간 (분)</div><input class="edit-input" id="e-duration" type="number" /></div>
        <div>
          <div class="edit-label">무료 여부</div>
          <select class="edit-select" id="e-free">
            <option value="true">무료</option>
            <option value="false">유료</option>
          </select>
        </div>
        <div><div class="edit-label">필요 레벨</div><input class="edit-input" id="e-level" type="number" /></div>
        <div class="edit-full"><div class="edit-label">강의 설명</div><textarea class="edit-textarea" id="e-desc"></textarea></div>
        <div class="edit-full"><div class="edit-label">콘텐츠 URL (동영상/음성/실시간)</div><input class="edit-input" id="e-url" placeholder="https://youtube.com/..." /></div>
        <div class="edit-full"><div class="edit-label">텍스트 내용 (텍스트 강의)</div><textarea class="edit-textarea" id="e-text"></textarea></div>
        <div class="edit-full"><div class="edit-label">실시간 예정 일시</div><input class="edit-input" id="e-liveat" type="datetime-local" /></div>
      </div>
      <div class="edit-msg" id="edit-msg"></div>
      <button class="edit-btn" onclick="saveEdit()">저장하기</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/core/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const courseId = params.get('id');
  let currentUser = null;

  // XSS 방지 (텍스트 노드용)
  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str == null ? '' : String(str);
    return d.innerHTML;
  }
  // XSS 방지 (HTML 속성값용 - 따옴표까지 처리)
  function escAttr(str) {
    return esc(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  let courseData = null;

  const typeLabel = { text: '📝 텍스트 강의', video: '🎬 동영상 강의', audio: '🎙️ 음성 강의', live: '🔴 실시간 강의' };

  function goBack() {
    const from = params.get('from');
    location.href = from || 'library.html';
  }

  function getYoutubeId(url) {
    try {
      const u = new URL(url);
      if (u.hostname.includes('youtube.com')) return u.searchParams.get('v');
      if (u.hostname === 'youtu.be') return u.pathname.slice(1);
    } catch(e) {}
    return null;
  }

  function getVimeoId(url) {
    try {
      const u = new URL(url);
      if (u.hostname.replace(/^www\./, '') === 'vimeo.com') {
        const id = u.pathname.split('/').filter(Boolean)[0];
        if (id && /^\d+$/.test(id)) return id;
      }
    } catch(e) {}
    return null;
  }

  // http/https만 허용 (javascript: 등 위험한 스킴 차단)
  function isSafeUrl(url) {
    if (!url) return false;
    try {
      const u = new URL(url);
      return ['http:', 'https:'].includes(u.protocol);
    } catch {
      return false;
    }
  }

  async function init() {
    if (!courseId) { location.href = 'library.html'; return; }

    const { data: { session } } = await soolClient.auth.getSession();
    if (session) {
      const { data: user } = await soolClient.from('users').select('id, nickname, level, is_admin, is_instructor').eq('id', session.user.id).single();
      currentUser = user;
    }

    await loadCourse();
    document.getElementById('page-loading').classList.add('hide');
  }

  async function loadCourse() {
    const { data, error } = await soolClient.from('courses').select('*, users(nickname)').eq('id', courseId).single();
    if (error || !data) { location.href = 'library.html'; return; }
    courseData = data;

    document.title = data.title + ' — 술향기마을';
    document.getElementById('c-type').textContent = typeLabel[data.type] || '강의';
    document.getElementById('c-title').textContent = data.title;
    document.getElementById('c-instructor').textContent = '강사: ' + (data.users?.nickname || '관리자');
    document.getElementById('c-duration').textContent = data.duration_min ? data.duration_min + '분' : '';
    document.getElementById('c-level').textContent = data.required_level > 1 ? 'Lv.' + data.required_level + ' 이상' : '';
    document.getElementById('c-free').textContent = data.is_free ? '무료' : '유료';

    if (data.description) {
      document.getElementById('c-desc').textContent = data.description;
      document.getElementById('section-desc').style.display = 'block';
    }

    // 콘텐츠 렌더링
    const contentEl = document.getElementById('c-content');
    if (data.type === 'text') {
      const safeHtml = data.content_text
        ? DOMPurify.sanitize(data.content_text, {
            ALLOWED_TAGS: ['b','strong','i','em','u','p','br','ul','ol','li','a','img','h1','h2','h3','h4','blockquote','code','pre','span','div'],
            ALLOWED_ATTR: ['href','src','alt','title','target','rel'],
          })
        : '내용이 없어요.';
      contentEl.innerHTML = `<div class="content-text">${safeHtml}</div>`;
    } else if (data.type === 'video' && data.content_url) {
      const ytId = getYoutubeId(data.content_url);
      const vimeoId = getVimeoId(data.content_url);
      if (ytId) {
        contentEl.innerHTML = `<div class="video-wrap"><iframe src="https://www.youtube.com/embed/${escAttr(ytId)}" allowfullscreen></iframe></div>`;
      } else if (vimeoId) {
        contentEl.innerHTML = `<div class="video-wrap"><iframe src="https://player.vimeo.com/video/${escAttr(vimeoId)}" allowfullscreen></iframe></div>`;
      } else {
        contentEl.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-muted);font-size:13px;">지원하지 않는 영상 링크예요. (유튜브/Vimeo만 지원)</div>';
      }
    } else if (data.type === 'audio' && data.content_url && isSafeUrl(data.content_url)) {
      contentEl.innerHTML = `<div class="audio-wrap">🎙️ <audio controls style="flex:1;"><source src="${escAttr(data.content_url)}">브라우저가 오디오를 지원하지 않아요.</audio></div>`;
    } else if (data.type === 'audio') {
      contentEl.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-muted);font-size:13px;">올바르지 않은 음성 링크예요.</div>';
    } else if (data.type === 'live') {
      const liveTime = data.live_at ? new Date(data.live_at).toLocaleString('ko-KR') : '일정 미정';
      const isLive = data.live_at && new Date(data.live_at) <= new Date();
      const canJoin = data.content_url && isLive && isSafeUrl(data.content_url);
      contentEl.innerHTML = `
        <div class="live-wrap">
          <div style="font-size:32px;margin-bottom:8px;">🔴</div>
          <div style="font-size:16px;font-weight:700;margin-bottom:8px;">실시간 강의</div>
          <div class="live-time">예정 시간: ${liveTime}</div>
          ${canJoin ? `<button class="live-btn" id="live-join-btn">강의 참여하기</button>` : '<div style="font-size:13px;color:rgba(255,255,255,0.6);">강의 시작 전이에요</div>'}
        </div>`;
      if (canJoin) {
        document.getElementById('live-join-btn').addEventListener('click', () => window.open(data.content_url, '_blank'));
      }
    } else {
      contentEl.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-muted);font-size:13px;">콘텐츠가 없어요.</div>';
    }

    // 어드민 또는 해당 강의 강사에게 수정 버튼 표시
    if (currentUser?.is_admin || (currentUser?.is_instructor && data.instructor_id === currentUser.id)) {
      document.getElementById('edit-btn').style.display = 'block';
    }

    // 수강 상태 확인
    await checkEnrollment();
  }

  async function checkEnrollment() {
    const wrap = document.getElementById('enroll-wrap');
    if (!currentUser) {
      wrap.innerHTML = `<div style="text-align:center;font-size:13px;color:var(--text-muted);padding:8px;"><a href="auth.html" style="color:var(--blue-400);text-decoration:none;">로그인</a> 후 수강 신청할 수 있어요</div>`;
      return;
    }

    const { data, error } = await soolClient.from('course_enrollments')
      .select('*').eq('user_id', currentUser.id).eq('course_id', courseId).maybeSingle();
    if (error) { console.error('수강 상태 확인 실패:', error); return; }

    if (data) {
      if (data.completed) {
        wrap.innerHTML = `<div style="text-align:center;padding:12px;font-size:14px;color:#16a34a;font-weight:600;">🎓 수료 완료!</div>`;
      } else {
        wrap.innerHTML = `
          <div style="font-size:13px;color:var(--text-muted);margin-bottom:8px;">수강 중</div>
          <button class="complete-btn" onclick="completeCourse()">✅ 수료 완료로 표시하기 (+200 XP)</button>
          <div class="msg" id="enroll-msg"></div>`;
      }
    }
  }

  let isEnrolling = false;
  async function enroll() {
    if (!currentUser) { location.href = 'auth.html'; return; }
    if (isEnrolling) return;

    // 레벨 체크
    if (courseData.required_level > (currentUser.level || 1)) {
      document.getElementById('enroll-msg').className = 'msg error';
      document.getElementById('enroll-msg').textContent = `Lv.${courseData.required_level} 이상만 수강할 수 있어요.`;
      document.getElementById('enroll-msg').style.display = 'block';
      return;
    }

    isEnrolling = true;
    const btn = document.getElementById('enroll-btn');
    if (btn) btn.disabled = true;

    try {
      const { error } = await soolClient.from('course_enrollments').insert({
        user_id: currentUser.id, course_id: courseId
      });

      if (error) {
        document.getElementById('enroll-msg').className = 'msg error';
        document.getElementById('enroll-msg').textContent = '이미 수강 신청된 강의예요.';
        document.getElementById('enroll-msg').style.display = 'block';
      } else {
        await checkEnrollment();
      }
    } finally {
      isEnrolling = false;
      if (btn) btn.disabled = false;
    }
  }

  let isCompletingCourse = false;
  async function completeCourse() {
    if (isCompletingCourse) return;
    isCompletingCourse = true;
    const btn = document.querySelector('.complete-btn');
    if (btn) btn.disabled = true;

    try {
      // 수료 처리 + XP 지급을 RPC로 한 번에 (원자적 처리)
      const { error } = await soolClient.rpc('complete_course', {
        p_user_id: currentUser.id, p_course_id: courseId, p_xp_reward: 200
      });
      if (error) {
        console.error('수료 처리 실패:', error);
        const msg = document.getElementById('enroll-msg');
        if (msg) { msg.className = 'msg error'; msg.textContent = '수료 처리 중 오류가 발생했어요.'; msg.style.display = 'block'; }
        return;
      }
      await checkEnrollment();
    } finally {
      isCompletingCourse = false;
      if (btn) btn.disabled = false;
    }
  }

  // ── 수정 모달 ────────────────────────────────
  function openEditModal() {
    if (!courseData) return;
    document.getElementById('e-title').value = courseData.title || '';
    document.getElementById('e-type').value = courseData.type || 'text';
    document.getElementById('e-category').value = courseData.category || '';
    document.getElementById('e-duration').value = courseData.duration_min || '';
    document.getElementById('e-free').value = courseData.is_free ? 'true' : 'false';
    document.getElementById('e-level').value = courseData.required_level || 1;
    document.getElementById('e-desc').value = courseData.description || '';
    document.getElementById('e-url').value = courseData.content_url || '';
    document.getElementById('e-text').value = courseData.content_text || '';
    if (courseData.live_at) {
      document.getElementById('e-liveat').value = courseData.live_at.slice(0, 16);
    }
    document.getElementById('edit-modal-bg').classList.add('show');
  }

  function closeEditModal() { document.getElementById('edit-modal-bg').classList.remove('show'); }
  function closeEditModalBg(e) { if (e.target === document.getElementById('edit-modal-bg')) closeEditModal(); }

  let isSavingEdit = false;
  async function saveEdit() {
    if (isSavingEdit) return;
    const title = document.getElementById('e-title').value.trim();
    const type = document.getElementById('e-type').value;
    if (!title || !type) {
      const el = document.getElementById('edit-msg');
      el.className = 'edit-msg error'; el.textContent = '제목과 유형은 필수예요!'; return;
    }

    isSavingEdit = true;
    const btn = document.querySelector('.edit-btn');
    if (btn) btn.disabled = true;

    try {
      const { error } = await soolClient.from('courses').update({
        title,
        type,
        category: document.getElementById('e-category').value || null,
        duration_min: parseInt(document.getElementById('e-duration').value) || 0,
        is_free: document.getElementById('e-free').value === 'true',
        required_level: parseInt(document.getElementById('e-level').value) || 1,
        description: document.getElementById('e-desc').value.trim() || null,
        content_url: document.getElementById('e-url').value.trim() || null,
        content_text: document.getElementById('e-text').value.trim() || null,
        live_at: document.getElementById('e-liveat').value || null,
      }).eq('id', courseId);

      const el = document.getElementById('edit-msg');
      if (error) { el.className = 'edit-msg error'; el.textContent = '저장 중 오류가 발생했어요.'; }
      else { el.className = 'edit-msg success'; el.textContent = '저장됐어요! ✅'; setTimeout(() => { closeEditModal(); loadCourse(); }, 1000); }
    } finally {
      isSavingEdit = false;
      if (btn) btn.disabled = false;
    }
  }

  init();
</script>
</body>
</html>
